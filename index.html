<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>霞落之境 SUNSET REALM NIGHTCLUB</title>
  
  <!-- Favicon 設定 -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for JSX compilation directly in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Import Maps for ES Modules -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/10.10.0/firebase-analytics.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
  </script>

  <!-- Global Styles -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
    
    body {
      background: linear-gradient(180deg, #2a0845 0%, #6441A5 40%, #cc5b5c 80%, #ff7b00 100%);
      background-attachment: fixed;
    }
    
    .font-serif {
      font-family: 'Playfair Display', serif;
    }

    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-left: 1px solid rgba(236,72,153,0.1); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(249,115,22,0.5); border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(236,72,153,0.8); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="text-gray-100 font-sans selection:bg-pink-500/40 overflow-hidden">
  
  <div id="root"></div>

  <!-- React & App Logic -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef, createContext, useContext } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAnalytics } from 'firebase/analytics';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, updateDoc, deleteDoc, query, orderBy, limit, writeBatch } from 'firebase/firestore';
    import {
      Home, ShoppingCart, ListOrdered, Utensils, Package, Tags, Users, LogOut, GripVertical,
      Plus, Trash2, Edit, Check, X, Clock, Play, Square, DollarSign, TrendingUp, AlertCircle, Activity,
      Settings, Download, Upload, FileJson, ChevronLeft, ChevronRight, BarChart2, Calendar, Trophy, History, Sliders, Shield, Search, AlertTriangle, Zap, Calculator, ImageIcon, Copy, FileSpreadsheet, Warehouse, Eye, EyeOff, Moon, Sunset
    } from 'lucide-react';

    // --- Firebase Initialization ---
    const firebaseConfig = {
      apiKey: "AIzaSyBZRWfUdwo8x8lnZtAEPVNRU-CKZyZTjdw",
      authDomain: "jsvtb-48aff.firebaseapp.com",
      projectId: "jsvtb-48aff",
      storageBucket: "jsvtb-48aff.firebasestorage.app",
      messagingSenderId: "1010311063638",
      appId: "1:1010311063638:web:870c56def83e1de1df73f7",
      measurementId: "G-VV0PYS1VP0"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ROOT_COLL = 'Sunset';
    const ROOT_DOC = 'system_data';

    const getCollRef = (collName) => collection(db, ROOT_COLL, ROOT_DOC, collName);
    const getDocRef = (collName, docId) => doc(db, ROOT_COLL, ROOT_DOC, collName, docId);

    const toLocalDatetime = (isoStr) => {
      const d = new Date(isoStr);
      const pad = n => n.toString().padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };

    const PERMISSION_LIST = [
      { id: 'dashboard', label: '儀表板' }, { id: 'pos', label: '點餐系統' },
      { id: 'orders', label: '記帳歷史' }, { id: 'menu', label: '菜單管理' },
      { id: 'inventory', label: '庫存管理' }, { id: 'tags', label: '標籤管理' },
      { id: 'activities', label: '活動優惠' }, { id: 'users', label: '成員管理' },
      { id: 'roles', label: '權限職位' }, { id: 'settings', label: '系統設定' }
    ];

    const COLL_NAMES_MAP = {
      bar_users: '成員帳號', bar_roles: '權限職位', bar_categories: '夜店分類',
      bar_items: '酒水與餐點', bar_tags: '標籤', bar_activities: '活動優惠',
      bar_ingredients: '食材庫存', bar_orders: '記帳歷史', bar_inventory: '進貨紀錄',
      bar_operation_logs: '操作紀錄', bar_settings: '系統設定'
    };

    const AppContext = createContext(null);
    const useAppContext = () => useContext(AppContext);

    // --- Reusable UI Components ---
    const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
      const baseStyle = "px-5 py-2.5 rounded-full font-black tracking-widest uppercase disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 transition-all duration-300";
      const variants = {
        primary: "bg-gradient-to-r from-pink-600 to-orange-500 text-white hover:from-pink-500 hover:to-orange-400 shadow-[0_0_15px_rgba(249,115,22,0.5)] border border-orange-300/40",
        secondary: "bg-gradient-to-r from-purple-600 to-pink-600 text-white hover:from-purple-500 hover:to-pink-500 shadow-[0_0_15px_rgba(236,72,153,0.5)] border border-pink-300/40",
        danger: "bg-[#1c0c27]/80 text-pink-500 hover:bg-pink-950 border border-pink-900 hover:border-pink-500 shadow-inner",
        outline: "border border-purple-500/50 bg-black/40 text-purple-300 hover:text-orange-400 hover:border-orange-500/80"
      };
      return (
        <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    };

    const Input = ({ value, onChange, placeholder, type = 'text', className = '', icon: Icon, ...props }) => (
      <div className={`relative ${className}`}>
        {Icon && <Icon size={16} className="absolute left-4 top-1/2 transform -translate-y-1/2 text-pink-400" />}
        <input
          type={type} value={value} onChange={onChange} placeholder={placeholder}
          className={`w-full bg-[#1a0a24]/60 border border-purple-800/60 text-orange-100 ${Icon ? 'pl-10' : 'px-5'} py-2.5 rounded-xl focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500/50 shadow-inner font-bold placeholder-purple-400/50 backdrop-blur-sm transition-colors`}
          {...props}
        />
      </div>
    );

    const Card = ({ children, className = '' }) => (
      <div className={`bg-[#1e0a29]/70 backdrop-blur-md border border-pink-500/30 rounded-2xl p-6 shadow-[0_8px_30px_rgba(0,0,0,0.5),inset_0_0_20px_rgba(236,72,153,0.05)] relative overflow-hidden ${className}`}>
        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-orange-400/50 to-transparent"></div>
        {children}
      </div>
    );

    const EditDialog = ({ dialog, onClose }) => {
      const [values, setValues] = useState(dialog.fields.reduce((acc, f) => ({...acc, [f.key]: f.defaultValue}), {}));

      return (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
          <Card className="max-w-md w-full border-orange-500/50 shadow-[0_0_40px_rgba(249,115,22,0.3)]">
            <h3 className="text-xl font-bold text-orange-200 mb-5 flex items-center gap-2">
              <Edit size={20} className="text-orange-500"/> {dialog.title}
            </h3>
            <div className="space-y-4 mb-6 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
              {dialog.fields.map(f => (
                <div key={f.key}>
                  {f.type !== 'checkbox' && <label className="block text-sm text-pink-300/80 mb-1 pl-1 tracking-wider">{f.label}</label>}
                  {f.type === 'select' ? (
                    <select
                      className="w-full bg-[#1a0a24]/80 border border-purple-800/60 text-orange-100 px-4 py-3 rounded-xl focus:border-orange-500"
                      value={values[f.key]} onChange={e => setValues({...values, [f.key]: e.target.value})}
                    >
                      {f.options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                    </select>
                  ) : f.type === 'checkbox' ? (
                    <label className="flex items-center gap-3 cursor-pointer mt-2 mb-2 p-3 border border-purple-800/60 rounded-xl hover:bg-purple-900/30 bg-[#1a0a24]/60 backdrop-blur-sm transition-colors">
                      <input
                        type="checkbox" checked={values[f.key]} onChange={e => setValues({...values, [f.key]: e.target.checked})}
                        className="w-5 h-5 accent-orange-500 rounded"
                      />
                      <span className="text-orange-200 font-bold">{f.label}</span>
                    </label>
                  ) : (
                    <Input type={f.type || 'text'} value={values[f.key]} onChange={e => setValues({...values, [f.key]: e.target.value})} />
                  )}
                </div>
              ))}
            </div>
            <div className="flex justify-end gap-3 mt-8">
              <Button variant="outline" onClick={onClose}>取消</Button>
              <Button variant="primary" onClick={() => { dialog.onSave(values); onClose(); }}>確認儲存</Button>
            </div>
          </Card>
        </div>
      );
    };

    const copyToClipboard = (text) => {
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
    };

    const downloadCSV = (content, filename) => {
      const blob = new Blob(['\uFEFF' + content], { type: 'text/csv;charset=utf-8;' }); 
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
    };

    const getStockForWarehouse = (ing, wId) => {
      if (ing.stocks && typeof ing.stocks[wId] !== 'undefined') return ing.stocks[wId];
      if (wId === 'default') return ing.stock || 0; 
      return 0;
    };

    // --- Main App Component ---
    function App() {
      const [firebaseUser, setFirebaseUser] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);

      const [appUser, setAppUser] = useState(null); 
      const [activeTab, setActiveTab] = useState('dashboard');

      const [allData, setAllData] = useState({
        users: [], roles: [], categories: [], items: [], tags: [],
        activities: [], orders: [], inventoryLogs: [], ingredients: [],
        operationLogs: [], settingsData: []
      });
      
      const [dialog, setDialog] = useState(null); 

      const systemConfig = allData.settingsData.find(d => d.id === 'config') || { ignoreAllCosts: false, warehouses: [{ id: 'default', name: '主要吧台' }] };
      const warehouses = systemConfig.warehouses && systemConfig.warehouses.length > 0 ? systemConfig.warehouses : [{ id: 'default', name: '主要吧台' }];

      const isGuest = appUser === 'guest';
      const isLegacyAdmin = !isGuest && appUser?.role === 'admin';
      const fallbackPerms = isLegacyAdmin ? PERMISSION_LIST.reduce((acc, curr) => ({ ...acc, [curr.id]: true }), {}) : { dashboard: true, pos: true };
      const userRole = isGuest ? null : allData.roles.find(r => r.id === appUser?.role) || { permissions: fallbackPerms };

      const showConfirm = (message, onConfirm) => setDialog({ type: 'confirm', message, onConfirm });
      const showAlert = (message) => setDialog({ type: 'alert', message });
      const showEdit = (config) => setDialog({ type: 'edit', ...config });

      const logAction = async (action, details) => {
        if (!appUser || isGuest) return;
        try {
          await addDoc(getCollRef('bar_operation_logs'), { userName: appUser.name, action, details, timestamp: Date.now() });
        } catch (e) { console.error("Logging failed", e); }
      };

      const handleInitializeSystem = async () => {
        try {
          const roleRef = doc(getCollRef('bar_roles'), 'admin_role');
          const allPerms = PERMISSION_LIST.reduce((acc, curr) => ({ ...acc, [curr.id]: true }), {});
          await setDoc(roleRef, { name: '最高管理員', permissions: allPerms, isSystem: true });

          await addDoc(getCollRef('bar_users'), { name: '宇洛', password: 'admin', role: 'admin_role', isOnline: false, lastActive: 0 });

          showAlert('系統初始化成功！已經為您建立首位管理員帳號：宇洛。您現在可以選擇帳號登入了！');
        } catch (err) {
          showAlert('初始化失敗：' + err.message);
        }
      };

      const handleCheckout = async (orderData) => {
        try {
          const batch = writeBatch(db);
          
          const orderRef = doc(getCollRef('bar_orders'));
          batch.set(orderRef, { ...orderData, timestamp: Date.now() });

          const ingredientDeductions = {};
          for (const item of orderData.items) {
            if (item.recipe) {
              for (const req of item.recipe) {
                ingredientDeductions[req.ingredientId] = (ingredientDeductions[req.ingredientId] || 0) + (req.qty * item.qty);
              }
            }
          }

          for (const [ingId, consumeQty] of Object.entries(ingredientDeductions)) {
            const dbIngredient = allData.ingredients.find(ig => ig.id === ingId);
            if (dbIngredient) {
              const ingRef = getDocRef('bar_ingredients', ingId);
              const oldStocks = dbIngredient.stocks || { default: dbIngredient.stock || 0 };
              const targetWId = orderData.warehouseId || 'default';
              
              const newWarehouseStock = (oldStocks[targetWId] || 0) - consumeQty;
              const newStocks = { ...oldStocks, [targetWId]: newWarehouseStock };
              const newTotalStock = Object.values(newStocks).reduce((a, b) => a + b, 0);

              batch.update(ingRef, { stocks: newStocks, stock: newTotalStock });

              const invLogRef = doc(getCollRef('bar_inventory'));
              batch.set(invLogRef, {
                ingredientId: ingId, ingredientName: dbIngredient.name, changeQty: -consumeQty,
                reason: `訂單消耗 (${orderData.guestName})`, costPerItem: dbIngredient.cost || 0, 
                warehouseId: targetWId, timestamp: Date.now()
              });
            }
          }
          await batch.commit();
          return true;
        } catch (error) {
          console.error("Checkout error:", error);
          return false;
        }
      };

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth);
          } catch (error) { console.error('Auth error:', error); }
        };
        initAuth();
        const unsub = onAuthStateChanged(auth, (user) => { setFirebaseUser(user); setIsInitializing(false); });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!firebaseUser) return;
        const unsubscribers = [];

        const subscribe = (collName, key, qObj = null) => {
          const q = qObj || getCollRef(collName);
          const unsub = onSnapshot(q, (snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setAllData(prev => ({ ...prev, [key]: data }));
          });
          unsubscribers.push(unsub);
        };

        subscribe('bar_users', 'users'); subscribe('bar_roles', 'roles');
        subscribe('bar_categories', 'categories'); subscribe('bar_items', 'items');
        subscribe('bar_tags', 'tags'); subscribe('bar_activities', 'activities');
        subscribe('bar_ingredients', 'ingredients'); subscribe('bar_settings', 'settingsData');
        
        subscribe('bar_orders', 'orders', query(getCollRef('bar_orders'), orderBy('timestamp', 'desc'), limit(1500)));
        subscribe('bar_inventory', 'inventoryLogs', query(getCollRef('bar_inventory'), orderBy('timestamp', 'desc'), limit(1000)));
        subscribe('bar_operation_logs', 'operationLogs', query(getCollRef('bar_operation_logs'), orderBy('timestamp', 'desc'), limit(300)));

        return () => unsubscribers.forEach(u => u());
      }, [firebaseUser]);

      useEffect(() => {
        if (!appUser || isGuest) return;
        const updateOnline = async () => { try { await updateDoc(getDocRef('bar_users', appUser.id), { isOnline: true, lastActive: Date.now() }); } catch(e){} };
        updateOnline();
        const interval = setInterval(updateOnline, 15000);
        return () => clearInterval(interval);
      }, [appUser]);

      const contextValue = useMemo(() => {
        const ingredientMap = {};
        allData.ingredients.forEach(ig => ingredientMap[ig.id] = ig);
        const categoryMap = {};
        allData.categories.forEach(c => categoryMap[c.id] = c);

        return {
          ...allData, appUser, isGuest, userRole, systemConfig, warehouses,
          showAlert, showConfirm, showEdit, logAction, handleCheckout,
          ingredientMap, categoryMap
        };
      }, [allData, appUser, isGuest, userRole, systemConfig, warehouses]);

      if (isInitializing) return <div className="min-h-screen bg-[#1c0c27] flex items-center justify-center text-orange-400 text-2xl font-bold tracking-widest drop-shadow-[0_0_10px_rgba(249,115,22,0.8)]">SYSTEM BOOTING...</div>;

      const activeUsers = allData.users.filter(u => u.isOnline && (Date.now() - u.lastActive < 30000));
      const allNavItems = [
        { id: 'dashboard', label: '儀表板', icon: Home }, { id: 'pos', label: '點餐系統', icon: ShoppingCart },
        { id: 'orders', label: '記帳歷史', icon: ListOrdered }, { id: 'menu', label: '夜店選單', icon: Utensils },
        { id: 'inventory', label: '庫存管理', icon: Package }, { id: 'tags', label: '標籤管理', icon: Tags },
        { id: 'activities', label: '活動優惠', icon: Activity }, { id: 'users', label: '成員管理', icon: Users },
        { id: 'roles', label: '權限職位', icon: Shield }, { id: 'settings', label: '系統設定', icon: Settings },
      ];

      const navItems = appUser ? (isGuest ? allNavItems.filter(i => i.id === 'dashboard') : allNavItems.filter(i => userRole?.permissions[i.id])) : [];
      if (appUser && !navItems.find(i => i.id === activeTab) && navItems.length > 0) setActiveTab(navItems[0].id);

      const logout = async () => {
        if (!isGuest) await updateDoc(getDocRef('bar_users', appUser.id), { isOnline: false });
        setAppUser(null);
      };

      return (
        <>
          {!appUser ? (
            <LoginScreen 
              users={allData.users} 
              roles={allData.roles} 
              onLogin={setAppUser} 
              onGuest={() => setAppUser('guest')} 
              onInit={() => showConfirm('確定要初始化全新資料庫並建立管理員「宇洛」嗎？', handleInitializeSystem)} 
            />
          ) : (
            <AppContext.Provider value={contextValue}>
              <div className="flex flex-col md:flex-row h-screen">
                
                {/* Sidebar */}
                <aside className="w-full md:w-64 bg-[#14051a]/80 backdrop-blur-xl border-b md:border-b-0 md:border-r border-pink-900/40 flex flex-col flex-shrink-0 shadow-[4px_0_30px_rgba(0,0,0,0.5)] relative z-10">
                  
                  <div className="p-8 flex flex-col items-center justify-center border-b border-pink-900/40 text-center relative overflow-hidden">
                    <div className="absolute inset-0 bg-gradient-to-b from-orange-500/10 to-transparent"></div>
                    <h1 className="text-3xl font-serif italic font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 via-yellow-300 to-orange-500 drop-shadow-[0_0_15px_rgba(249,115,22,0.6)] tracking-widest relative z-10">霞落之境</h1>
                    <h2 className="text-[11px] font-serif italic text-pink-200 tracking-[0.2em] mt-1 relative z-10">Sunset Realm</h2>
                    <div className="text-[9px] uppercase tracking-[0.3em] text-orange-400/80 mt-3 font-sans border-t border-orange-500/30 pt-2 w-full relative z-10">Nightclub System</div>
                  </div>
                  
                  <div className="p-4 flex-grow overflow-y-auto custom-scrollbar">
                    <nav className="space-y-1.5">
                      {navItems.map(item => {
                        const Icon = item.icon;
                        const isActive = activeTab === item.id;
                        return (
                          <button
                            key={item.id} onClick={() => setActiveTab(item.id)}
                            className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-300 ${
                              isActive 
                                ? 'bg-gradient-to-r from-pink-900/60 to-orange-900/30 text-orange-200 font-black shadow-[inset_0_0_15px_rgba(236,72,153,0.2)] border border-pink-500/30' 
                                : 'text-purple-300 hover:bg-pink-900/20 hover:text-orange-200 border border-transparent'
                            }`}
                          >
                            <Icon size={20} className={isActive ? 'text-orange-400 drop-shadow-[0_0_8px_rgba(249,115,22,0.8)]' : ''} />
                            <span className="tracking-widest uppercase text-sm">{item.label}</span>
                          </button>
                        );
                      })}
                    </nav>
                  </div>

                  <div className="p-4 border-t border-pink-900/40 bg-black/40 backdrop-blur-md">
                    <div className="mb-4">
                      <p className="text-[10px] text-pink-400 uppercase tracking-widest mb-2 font-bold flex items-center gap-1"><Zap size={12} className="text-yellow-400 drop-shadow-[0_0_5px_#facc15]"/> ONLINE</p>
                      <div className="flex flex-wrap gap-2">
                        {activeUsers.length === 0 ? <span className="text-sm text-purple-600">無人上線</span> : activeUsers.map(u => (
                          <div key={u.id} className="flex items-center gap-1.5 bg-[#1c0c27]/80 px-2.5 py-1 rounded-md border border-purple-800/50 text-xs shadow-sm">
                            <div className="w-2 h-2 rounded-full bg-orange-500 shadow-[0_0_8px_#f97316]"></div>
                            <span className={u.role === 'admin_role' ? 'text-orange-300 font-bold' : 'text-purple-300'}>{u.name}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div className="flex items-center justify-between bg-[#2d112b]/60 p-3.5 rounded-xl border border-pink-900/50 shadow-inner group transition-colors hover:bg-[#3a1538]/60">
                      <div>
                        <p className="text-sm font-black text-orange-100 group-hover:text-orange-300 tracking-wider transition-colors">{isGuest ? '遊客模式' : appUser.name}</p>
                        <p className="text-[10px] text-pink-400 uppercase tracking-widest">{isGuest ? '僅供預覽' : (allData.roles.find(r => r.id === appUser.role)?.name || '未知權限')}</p>
                      </div>
                      <button onClick={logout} className="text-purple-400 hover:text-orange-400 hover:bg-orange-500/10 p-2 rounded-lg transition-all" title="登出">
                        <LogOut size={18} />
                      </button>
                    </div>
                  </div>
                </aside>

                {/* Main Content Area */}
                <main className="flex-grow flex flex-col h-screen overflow-hidden relative">
                  <header className="bg-[#14051a]/60 backdrop-blur-xl border-b border-pink-900/40 p-5 md:px-8 shadow-[0_4px_30px_rgba(0,0,0,0.5)] flex-shrink-0 z-10 flex items-center">
                    <h1 className="text-xl md:text-2xl font-black text-orange-100 tracking-[0.2em] uppercase flex items-center gap-3 drop-shadow-[0_0_8px_rgba(249,115,22,0.4)]">
                      <span className="w-1.5 h-6 bg-gradient-to-b from-yellow-400 to-pink-500 rounded-full shadow-[0_0_10px_#ec4899]"></span>
                      {navItems.find(i => i.id === activeTab)?.label || '系統'}
                    </h1>
                  </header>

                  <div className="flex-grow overflow-y-auto p-4 md:p-8 custom-scrollbar relative z-0">
                    <div className="max-w-7xl mx-auto pb-10">
                      {activeTab === 'dashboard' && <DashboardView />}
                      {activeTab === 'pos' && <POSView />}
                      {activeTab === 'orders' && <OrdersView />}
                      {activeTab === 'menu' && <MenuManager />}
                      {activeTab === 'inventory' && <InventoryManager />}
                      {activeTab === 'tags' && <TagsManager />}
                      {activeTab === 'activities' && <ActivityManager />}
                      {activeTab === 'users' && <UserManager />}
                      {activeTab === 'roles' && <RoleManager />}
                      {activeTab === 'settings' && <SettingsView />}
                    </div>
                  </div>
                </main>
              </div>
            </AppContext.Provider>
          )}

          {/* Global Dialog Container (Always Rendered so it works on LoginScreen too) */}
          {dialog?.type === 'edit' && <EditDialog dialog={dialog} onClose={() => setDialog(null)} />}
          {dialog && dialog.type !== 'edit' && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
              <Card className="max-w-sm w-full border-orange-500 shadow-[0_0_40px_rgba(249,115,22,0.3)]">
                <h3 className="text-xl font-bold text-orange-200 mb-4 flex items-center gap-2">
                  <AlertCircle className="text-orange-500 drop-shadow-[0_0_5px_#f97316]"/> {dialog.type === 'confirm' ? '請確認操作' : '系統提示'}
                </h3>
                <p className="text-pink-100 mb-8 leading-relaxed">{dialog.message}</p>
                <div className="flex justify-end gap-3">
                  {dialog.type === 'confirm' && <Button variant="outline" onClick={() => setDialog(null)}>取消</Button>}
                  <Button variant="primary" onClick={() => { if (dialog.onConfirm) dialog.onConfirm(); setDialog(null); }}>確定</Button>
                </div>
              </Card>
            </div>
          )}
        </>
      );
    }

    // ==========================================
    // VIEWS
    // ==========================================

    const LoginScreen = ({ users, roles, onLogin, onGuest, onInit }) => {
      const [selectedUser, setSelectedUser] = useState(null);
      const [password, setPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [error, setError] = useState('');

      const handleLogin = () => {
        if (selectedUser.password === password) onLogin(selectedUser);
        else { setError('密碼錯誤，請重新輸入！'); setPassword(''); }
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden bg-cover bg-center">
          <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
            {/* Ambient sunset glows */}
            <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-orange-600 rounded-full mix-blend-screen filter blur-[200px] opacity-40"></div>
            <div className="absolute top-1/4 left-1/4 transform -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-pink-600 rounded-full mix-blend-screen filter blur-[150px] opacity-30"></div>
          </div>

          <div className="z-10 w-full max-w-md">
            <div className="text-center mb-10">
              <h1 className="text-6xl font-serif italic font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 via-yellow-300 to-orange-500 drop-shadow-[0_0_25px_rgba(249,115,22,0.8)] tracking-wider mb-2">霞落之境</h1>
              <h2 className="text-2xl font-serif italic text-pink-300 tracking-[0.2em] drop-shadow-[0_0_10px_rgba(236,72,153,0.8)]">Sunset Realm</h2>
              <div className="text-sm uppercase tracking-[0.5em] text-orange-400 mt-6 font-sans font-bold flex items-center justify-center gap-3">
                <Sunset size={18} className="text-orange-500"/> Nightclub Menu <Sunset size={18} className="text-orange-500"/>
              </div>
            </div>

            <Card className="border-pink-500/40 bg-[#1c0c27]/80 backdrop-blur-2xl shadow-[0_10px_50px_rgba(0,0,0,0.8),inset_0_0_20px_rgba(236,72,153,0.1)] rounded-3xl">
              {!selectedUser ? (
                <div className="space-y-4">
                  <h2 className="text-lg font-black text-orange-200 border-b border-pink-900/50 pb-3 mb-5 flex items-center gap-2 tracking-widest uppercase">
                    <Users size={18} className="text-pink-500"/> 選擇授權身分
                  </h2>
                  <div className="grid grid-cols-2 gap-3 max-h-[300px] overflow-y-auto custom-scrollbar pr-2">
                    {users.map(u => {
                      const isTopAdmin = u.role === 'admin_role';
                      return (
                        <button
                          key={u.id} onClick={() => setSelectedUser(u)}
                          className="p-5 bg-[#2d112b]/60 border border-purple-800/60 rounded-xl hover:border-orange-500/80 hover:bg-pink-900/30 flex flex-col items-center justify-center gap-3 group transition-all shadow-inner hover:shadow-[0_0_15px_rgba(249,115,22,0.3)]"
                        >
                          <Shield size={26} className={isTopAdmin ? 'text-orange-400 drop-shadow-[0_0_10px_rgba(249,115,22,0.8)]' : 'text-purple-400 group-hover:text-pink-400 transition-colors'} />
                          <span className="text-pink-100 font-black text-sm tracking-wider">{u.name}</span>
                        </button>
                      );
                    })}
                  </div>
                  
                  {/* 空資料庫初始化提示與按鈕 */}
                  {users.length === 0 && (
                    <div className="text-center py-6">
                      <p className="text-pink-400 text-xs font-bold uppercase tracking-widest mb-4">系統尚未建立任何帳號</p>
                      <Button onClick={onInit} className="w-full text-sm shadow-[0_0_20px_rgba(249,115,22,0.4)]">
                        <Shield size={16}/> 點此建立管理員 (宇洛)
                      </Button>
                    </div>
                  )}
                  
                  <div className="mt-8 pt-5 border-t border-purple-900/50">
                    <button
                      onClick={onGuest}
                      className="w-full py-3.5 text-xs font-black tracking-[0.3em] text-purple-400 hover:text-orange-300 bg-black/30 rounded-xl hover:bg-orange-900/20 border border-purple-900/60 hover:border-orange-500/50 transition-all shadow-inner"
                    >
                      [ 進入遊客預覽模式 ]
                    </button>
                  </div>
                </div>
              ) : (
                <div className="space-y-8">
                  <div className="flex items-center gap-4 border-b border-pink-900/50 pb-5">
                    <button onClick={() => { setSelectedUser(null); setError(''); setPassword(''); setShowPassword(false); }} className="text-purple-400 hover:text-orange-400 p-2.5 bg-[#120518]/60 border border-purple-800/50 rounded-xl hover:bg-pink-900/30 transition-all shadow-inner">
                      <ChevronLeft size={20} />
                    </button>
                    <div>
                      <h2 className="text-2xl font-black text-orange-100 tracking-widest uppercase drop-shadow-md">{selectedUser.name}</h2>
                      <p className="text-xs text-pink-500 font-bold tracking-widest uppercase mt-1">{roles.find(r => r.id === selectedUser.role)?.name || '系統身分'}</p>
                    </div>
                  </div>
                  
                  <div>
                    <div className="relative">
                      <input
                        type={showPassword ? "text" : "password"}
                        value={password}
                        onChange={(e) => setPassword(e.target.value)}
                        onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                        className="w-full bg-[#120518]/80 border border-pink-900 text-orange-400 text-center text-3xl tracking-[0.5em] py-5 rounded-2xl focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500/50 shadow-[inset_0_0_20px_rgba(0,0,0,0.8)] font-mono placeholder-purple-800/80 placeholder:text-base placeholder:tracking-widest transition-colors"
                        placeholder="PASSWORD"
                        autoFocus
                      />
                      <button
                        type="button"
                        onClick={() => setShowPassword(!showPassword)}
                        className="absolute right-5 top-1/2 transform -translate-y-1/2 text-purple-500 hover:text-pink-400 transition-colors"
                      >
                        {showPassword ? <EyeOff size={24} /> : <Eye size={24} />}
                      </button>
                    </div>
                    {error && <p className="text-pink-500 text-xs mt-4 font-black tracking-wider text-center drop-shadow-[0_0_5px_rgba(236,72,153,0.5)]">{error}</p>}
                  </div>

                  <Button onClick={handleLogin} className="w-full py-4 text-lg tracking-[0.3em] uppercase rounded-xl">
                    Auth Login
                  </Button>
                </div>
              )}
            </Card>
          </div>
        </div>
      );
    };

    const DashboardView = () => {
      const { orders, inventoryLogs, ingredients, systemConfig, isGuest } = useAppContext();
      const [period, setPeriod] = useState('month'); 
      const [refDate, setRefDate] = useState(new Date());

      const lowStockItems = useMemo(() => ingredients.filter(i => (i.stock || 0) <= 5).sort((a,b) => (a.stock||0) - (b.stock||0)), [ingredients]);

      const { startDate, endDate, periodLabel, chartTicks } = useMemo(() => {
        const d = new Date(refDate);
        let start, end, label, ticks = [];
        if (period === 'week') {
          const day = d.getDay();
          const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
          start = new Date(d.setDate(diff)); start.setHours(0, 0, 0, 0);
          end = new Date(start); end.setDate(start.getDate() + 6); end.setHours(23, 59, 59, 999);
          label = `${start.getMonth() + 1}月${start.getDate()}日 - ${end.getMonth() + 1}月${end.getDate()}日`;
          const weekDays = ['週一', '週二', '週三', '週四', '週五', '週六', '週日'];
          for (let i = 0; i < 7; i++) {
            const t = new Date(start); t.setDate(start.getDate() + i);
            ticks.push({ label: weekDays[i], matchStart: t.getTime(), matchEnd: t.getTime() + 86399999 });
          }
        } else if (period === 'month') {
          start = new Date(d.getFullYear(), d.getMonth(), 1);
          end = new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59, 999);
          label = `${d.getFullYear()}年 ${d.getMonth() + 1}月`;
          const days = end.getDate();
          for (let i = 1; i <= days; i++) {
            const t = new Date(d.getFullYear(), d.getMonth(), i);
            ticks.push({ label: `${i}日`, matchStart: t.getTime(), matchEnd: t.getTime() + 86399999 });
          }
        } else {
          start = new Date(d.getFullYear(), 0, 1);
          end = new Date(d.getFullYear(), 11, 31, 23, 59, 59, 999);
          label = `${d.getFullYear()} 年度`;
          for (let i = 0; i < 12; i++) {
            const tStart = new Date(d.getFullYear(), i, 1);
            const tEnd = new Date(d.getFullYear(), i + 1, 0, 23, 59, 59, 999);
            ticks.push({ label: `${i + 1}月`, matchStart: tStart.getTime(), matchEnd: tEnd.getTime() });
          }
        }
        return { startDate: start, endDate: end, periodLabel: label, chartTicks: ticks };
      }, [period, refDate]);

      const changeDate = (delta) => {
        const newD = new Date(refDate);
        if (period === 'week') newD.setDate(newD.getDate() + delta * 7);
        if (period === 'month') newD.setMonth(newD.getMonth() + delta);
        if (period === 'year') newD.setFullYear(newD.getFullYear() + delta);
        setRefDate(newD);
      };

      const { stats, chartData, topItems } = useMemo(() => {
        const sTs = startDate.getTime(), eTs = endDate.getTime();
        const pOrders = orders.filter(o => o.timestamp >= sTs && o.timestamp <= eTs);
        const pInv = inventoryLogs.filter(l => l.timestamp >= sTs && l.timestamp <= eTs);

        const revenue = pOrders.reduce((s, o) => s + o.total, 0);
        const cogs = systemConfig.ignoreAllCosts ? 0 : pOrders.reduce((s, o) => s + (o.totalCost || 0), 0); 
        const inventoryCost = systemConfig.ignoreAllCosts ? 0 : pInv.filter(l => l.changeQty > 0 && l.reason.includes('進貨')).reduce((s, l) => s + (l.changeQty * (l.costPerItem || 0)), 0);

        const cData = chartTicks.map(tick => {
          const tOrders = pOrders.filter(o => o.timestamp >= tick.matchStart && o.timestamp <= tick.matchEnd);
          const tRev = tOrders.reduce((s, o) => s + o.total, 0);
          const tCogs = systemConfig.ignoreAllCosts ? 0 : tOrders.reduce((s, o) => s + (o.totalCost || 0), 0);
          return { label: tick.label, revenue: tRev, profit: tRev - tCogs };
        });

        const iSales = {};
        pOrders.forEach(o => o.items.forEach(i => {
          if (!iSales[i.name]) iSales[i.name] = { qty: 0, revenue: 0 };
          iSales[i.name].qty += i.qty; iSales[i.name].revenue += ((i.price || 0) * i.qty);
        }));
        const top = Object.entries(iSales).map(([n, d]) => ({ name: n, ...d })).sort((a, b) => b.revenue - a.revenue).slice(0, 5);

        return { stats: { revenue, profit: revenue - cogs, inventoryCost, orderCount: pOrders.length }, chartData: cData, topItems: top };
      }, [startDate, endDate, orders, inventoryLogs, chartTicks, systemConfig.ignoreAllCosts]);

      const maxChart = Math.max(...chartData.map(d => Math.max(d.revenue, d.profit, 1)));
      const blurClass = isGuest ? "blur-[8px] select-none pointer-events-none opacity-40" : "";

      return (
        <div className="space-y-6">
          {isGuest && (
            <div className="bg-orange-900/40 border border-orange-500/50 text-orange-200 p-5 rounded-2xl flex items-center gap-4 font-bold shadow-lg backdrop-blur-md">
              <AlertCircle size={28} className="text-orange-400 drop-shadow-[0_0_8px_rgba(249,115,22,0.8)]" />
              遊客預覽模式啟動。核心營運數據已啟動最高級別模糊遮罩，請登入專屬授權帳號以解鎖。
            </div>
          )}

          {lowStockItems.length > 0 && (
            <Card className="border-pink-500/50 shadow-[0_0_20px_rgba(236,72,153,0.2)] overflow-hidden relative">
              <div className="absolute top-0 right-0 w-40 h-40 bg-pink-500/10 blur-3xl rounded-full"></div>
              <h2 className="text-lg font-bold text-pink-400 mb-4 flex items-center gap-2">
                <AlertTriangle size={20} /> 庫存低位警報
              </h2>
              <div className="flex gap-4 overflow-x-auto pb-2 custom-scrollbar">
                {lowStockItems.map(ing => (
                  <div key={ing.id} className="flex-shrink-0 bg-[#1c0c27]/60 border border-pink-900/50 rounded-xl px-5 py-3 flex flex-col items-center justify-center min-w-[110px] shadow-sm">
                    <span className="text-purple-200 text-sm font-bold mb-1">{ing.name}</span>
                    <span className={`text-2xl font-black ${ing.stock <= 0 ? 'text-pink-500 drop-shadow-[0_0_5px_#ec4899]' : 'text-orange-400 drop-shadow-[0_0_5px_#f97316]'}`}>{ing.stock || 0}</span>
                  </div>
                ))}
              </div>
            </Card>
          )}

          <div className="flex flex-col md:flex-row justify-between items-center bg-[#1e0a29]/60 p-3 md:p-5 rounded-2xl border border-pink-900/30 shadow-[0_8px_30px_rgba(0,0,0,0.5)] gap-4 backdrop-blur-md">
            <div className="flex bg-[#120518]/60 rounded-xl p-1.5 w-full md:w-auto border border-purple-900/40">
              {['week', 'month', 'year'].map(p => (
                <button
                  key={p} onClick={() => setPeriod(p)}
                  className={`flex-1 md:flex-none px-5 py-2.5 rounded-lg text-sm font-bold transition-all ${period === p ? 'bg-gradient-to-r from-pink-600 to-orange-500 text-white shadow-md' : 'text-purple-300 hover:text-orange-200 hover:bg-pink-900/30'}`}
                >
                  {p === 'week' ? '單週' : p === 'month' ? '單月' : '年度'}
                </button>
              ))}
            </div>

            <div className="flex items-center gap-4 bg-[#120518]/60 px-5 py-2.5 rounded-xl border border-purple-900/40 shadow-inner">
              <button onClick={() => changeDate(-1)} className="p-1 text-purple-400 hover:text-orange-400 transition-colors"><ChevronLeft size={20} /></button>
              <div className="flex items-center gap-2 text-lg font-bold text-orange-100 min-w-[160px] justify-center tracking-wider">
                <Calendar size={18} className="text-orange-500" /> {periodLabel}
              </div>
              <button onClick={() => changeDate(1)} className="p-1 text-purple-400 hover:text-orange-400 transition-colors"><ChevronRight size={20} /></button>
            </div>
          </div>

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
            {[
              { label: '期間營收', val: stats.revenue, icon: DollarSign, color: 'text-white', border: 'border-b-pink-500', shadow: 'shadow-pink-900/20' },
              { label: '實質淨利', val: stats.profit, icon: TrendingUp, color: 'text-yellow-300 drop-shadow-[0_0_10px_rgba(253,224,71,0.6)]', border: 'border-b-orange-400', shadow: 'shadow-orange-900/20' },
              { label: '訂單總數', val: stats.orderCount, icon: ListOrdered, color: 'text-white', border: 'border-b-purple-500', shadow: 'shadow-purple-900/20', isNum: true },
              { label: '進貨花費', val: stats.inventoryCost, icon: Package, color: 'text-pink-300', border: 'border-b-fuchsia-600', shadow: 'shadow-fuchsia-900/20' }
            ].map((card, idx) => (
              <Card key={idx} className={`flex flex-col border-b-4 ${card.border} ${card.shadow} p-6 relative overflow-hidden`}>
                <p className="text-purple-300 text-xs md:text-sm mb-3 flex items-center gap-2 font-bold uppercase tracking-wider"><card.icon size={18} className={card.color.includes('yellow') ? 'text-orange-400' : 'text-pink-400'}/> {card.label}</p>
                <h3 className={`text-2xl md:text-4xl font-black ${card.color} ${!card.isNum ? blurClass : ''}`}>
                  {!card.isNum && '$'}{card.val.toLocaleString()} {card.isNum && <span className="text-base text-purple-400 font-normal ml-1">單</span>}
                </h3>
                {isGuest && !card.isNum && <div className="absolute inset-0 flex items-center justify-center text-pink-500/40 font-black rotate-[-15deg] tracking-[0.5em] text-xl pointer-events-none drop-shadow-md">CLASSIFIED</div>}
              </Card>
            ))}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <Card className="lg:col-span-2 relative overflow-hidden">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-lg font-bold text-orange-100 flex items-center gap-2"><BarChart2 size={20} className="text-orange-500 drop-shadow-[0_0_5px_#f97316]"/> 營收與淨利走勢</h2>
                <div className="flex gap-5 text-xs font-bold">
                  <span className="flex items-center gap-2 text-purple-200"><span className="w-3.5 h-3.5 rounded-full bg-pink-500/80 shadow-[0_0_5px_#ec4899]"></span> 總營收</span>
                  <span className="flex items-center gap-2 text-purple-200"><span className="w-3.5 h-3.5 rounded-full bg-yellow-400 shadow-[0_0_8px_#facc15]"></span> 淨利</span>
                </div>
              </div>
              
              <div className={`w-full h-[300px] flex items-end gap-1 sm:gap-2 relative pt-6 pb-6 border-b border-purple-800/50 ${blurClass}`}>
                {[25, 50, 75].map(pct => (
                  <div key={pct} className="absolute w-full border-b border-purple-500/20 border-dashed z-0" style={{ bottom: `${pct}%` }}></div>
                ))}

                {chartData.map((d, idx) => (
                  <div key={idx} className="flex-1 flex flex-col justify-end items-center group relative h-full z-10 cursor-crosshair">
                    <div className="absolute bottom-full mb-3 hidden group-hover:block bg-[#120518]/95 border border-pink-500/50 text-xs p-3.5 rounded-xl shadow-[0_10px_30px_rgba(236,72,153,0.3)] backdrop-blur-md pointer-events-none whitespace-nowrap">
                      <div className="font-bold text-orange-200 mb-2 border-b border-purple-800/50 pb-2">{d.label}</div>
                      <div className="text-pink-400 font-mono text-sm mb-1">Rev: ${Math.round(d.revenue).toLocaleString()}</div>
                      <div className="text-yellow-400 font-mono text-sm">Net: ${Math.round(d.profit).toLocaleString()}</div>
                    </div>
                    
                    <div className="w-full max-w-[24px] flex flex-col justify-end h-full relative">
                      <div className="absolute bottom-0 w-full bg-gradient-to-t from-pink-700 to-pink-500/80 rounded-t-md group-hover:brightness-125 transition-all shadow-[0_0_10px_rgba(236,72,153,0.3)]" style={{ height: `${(d.revenue / maxChart) * 100}%`, minHeight: d.revenue > 0 ? '4px' : '0' }}></div>
                      <div className="absolute bottom-0 w-full bg-gradient-to-t from-orange-500 to-yellow-400 rounded-t-md shadow-[0_0_10px_rgba(250,204,21,0.5)] group-hover:brightness-125 transition-all" style={{ height: `${(d.profit / maxChart) * 100}%`, minHeight: d.profit > 0 ? '4px' : '0' }}></div>
                    </div>
                    <div className="text-[10px] sm:text-xs text-purple-400 mt-3 truncate w-full text-center group-hover:text-orange-200 transition-colors">
                      {period === 'month' ? d.label.replace('日', '') : d.label}
                    </div>
                  </div>
                ))}
              </div>
              {isGuest && <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-20">
                <span className="bg-[#1c0c27]/80 text-orange-300 px-8 py-3 rounded-full border border-orange-500/50 font-black tracking-widest backdrop-blur-md shadow-[0_0_25px_rgba(249,115,22,0.5)]">DATA CLASSIFIED</span>
              </div>}
            </Card>

            <Card className="lg:col-span-1 border border-pink-900/30">
              <h2 className="text-lg font-bold text-orange-100 mb-6 flex items-center gap-2"><Trophy size={20} className="text-yellow-400 drop-shadow-[0_0_5px_#facc15]"/> 熱銷排行 TOP 5</h2>
              <div className="space-y-3.5">
                {topItems.length === 0 ? <p className="text-purple-500 text-center py-10 font-bold">尚無銷售紀錄</p> : 
                  topItems.map((item, index) => (
                    <div key={item.name} className="flex items-center gap-4 bg-[#120518]/50 p-3.5 rounded-xl border border-purple-900/40 hover:border-pink-500/50 transition-colors">
                      <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-sm shadow-inner ${
                        index === 0 ? 'bg-gradient-to-br from-yellow-300 to-orange-500 text-white shadow-[0_0_15px_rgba(249,115,22,0.5)]' :
                        index === 1 ? 'bg-gradient-to-br from-gray-300 to-gray-500 text-gray-900' :
                        index === 2 ? 'bg-gradient-to-br from-orange-700 to-pink-800 text-white' : 'bg-purple-900/50 text-purple-400'
                      }`}>{index + 1}</div>
                      <div className="flex-grow min-w-0">
                        <p className="font-bold text-orange-50 truncate text-base">{item.name}</p>
                        <p className="text-[11px] text-pink-400 uppercase tracking-wider">{item.qty} UNITS SOLD</p>
                      </div>
                      <div className={`text-right font-black text-orange-400 ${blurClass} font-mono text-lg`}>
                        ${item.revenue.toLocaleString()}
                      </div>
                    </div>
                  ))
                }
              </div>
            </Card>
          </div>
        </div>
      );
    };

    const POSView = () => {
      const { items, categories, activities, ingredients, warehouses, handleCheckout, showAlert, logAction, systemConfig, ingredientMap } = useAppContext();
      const [cart, setCart] = useState([]);
      const [guestName, setGuestName] = useState('');
      const [selectedCategoryId, setSelectedCategoryId] = useState('all');
      const [selectedActivityId, setSelectedActivityId] = useState('none');
      const [selectedWarehouseId, setSelectedWarehouseId] = useState(warehouses[0]?.id || 'default');
      const [isProcessing, setIsProcessing] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');

      const activeActs = useMemo(() => {
        const now = new Date().toISOString();
        return activities.filter(a => a.isActive && a.startTime <= now && a.endTime >= now);
      }, [activities]);

      const updateCart = (item, delta = 1) => {
        setCart(prev => {
          const exist = prev.find(i => i.id === item.id);
          if (exist) return prev.map(i => i.id === item.id ? { ...i, qty: Math.max(0, i.qty + delta) } : i).filter(i => i.qty > 0);
          return delta > 0 ? [...prev, { ...item, qty: 1 }] : prev;
        });
      };

      const cartTotals = useMemo(() => {
        const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        const totalCost = systemConfig.ignoreAllCosts ? 0 : cart.reduce((s, cItem) => {
          let iCost = cItem.recipe ? cItem.recipe.reduce((c, req) => {
            const ig = ingredientMap[req.ingredientId];
            return c + (!ig || ig.ignoreCost ? 0 : (ig.cost || 0) * req.qty);
          }, 0) : 0;
          return s + (iCost * cItem.qty);
        }, 0);
        
        let discount = 0;
        const act = activeActs.find(a => a.id === selectedActivityId);
        if (act) discount = act.type === 'percent' ? subtotal * (1 - act.value / 100) : act.value;
        
        const total = Math.max(0, subtotal - discount);
        return { subtotal, discount, total, totalCost, profit: total - totalCost };
      }, [cart, selectedActivityId, activeActs, systemConfig.ignoreAllCosts, ingredients]);

      const displayItems = useMemo(() => {
        let filtered = items;
        if (selectedCategoryId !== 'all') filtered = filtered.filter(i => i.categoryId === selectedCategoryId);
        if (searchQuery.trim()) filtered = filtered.filter(i => i.name.toLowerCase().includes(searchQuery.toLowerCase()));
        return filtered.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
      }, [items, selectedCategoryId, searchQuery]);

      const cartUsage = useMemo(() => {
        const usage = {};
        cart.forEach(c => c.recipe?.forEach(req => usage[req.ingredientId] = (usage[req.ingredientId] || 0) + (req.qty * c.qty)));
        return usage;
      }, [cart]);

      const getMakableQty = (item) => {
        if (!item.recipe?.length) return null; 
        let minQty = Infinity;
        for (const req of item.recipe) {
          const ing = ingredientMap[req.ingredientId];
          if (!ing) return 0; 
          const wStock = getStockForWarehouse(ing, selectedWarehouseId);
          const avail = wStock - (cartUsage[req.ingredientId] || 0);
          minQty = Math.min(minQty, Math.floor(Math.max(0, avail) / req.qty));
        }
        return minQty === Infinity ? 0 : minQty;
      };

      const processOrder = async () => {
        if (!guestName.trim()) return showAlert("請輸入包廂或客人名稱");
        if (cart.length === 0) return;
        setIsProcessing(true);
        const success = await handleCheckout({
          guestName, items: cart, ...cartTotals, warehouseId: selectedWarehouseId, activityId: selectedActivityId !== 'none' ? selectedActivityId : null
        });
        if (success) {
          const whName = warehouses.find(w => w.id === selectedWarehouseId)?.name || '未知吧台';
          logAction('新增點餐', `包廂/客人: ${guestName}, 金額: $${Math.round(cartTotals.total)} (出餐: ${whName})`);
          setCart([]); setGuestName(''); setSelectedActivityId('none');
        } else showAlert("結帳失敗，請重試");
        setIsProcessing(false);
      };

      const clearCart = () => {
        if (cart.length === 0 && !guestName) return;
        showConfirm("確定要清空當前購物車的所有項目嗎？", () => {
          setCart([]);
          setGuestName('');
          setSelectedActivityId('none');
        });
      };

      return (
        <div className="flex flex-col gap-6 min-h-[calc(100vh-140px)]">
          
          {/* 上方：菜單區域 */}
          <Card className="flex flex-col p-0 border-pink-500/30 shadow-[0_8px_30px_rgba(0,0,0,0.6)] h-[55vh] flex-shrink-0">
            <div className="flex flex-col sm:flex-row justify-between p-5 bg-[#120518]/80 border-b border-pink-900/50 gap-4 z-10 flex-shrink-0 backdrop-blur-md">
              <div className="flex overflow-x-auto gap-3 hide-scrollbar pb-1 custom-scrollbar">
                <button onClick={() => setSelectedCategoryId('all')} className={`px-6 py-2.5 rounded-full text-sm font-bold whitespace-nowrap transition-all ${selectedCategoryId === 'all' ? 'bg-gradient-to-r from-pink-600 to-orange-500 text-white shadow-[0_0_10px_rgba(249,115,22,0.4)]' : 'bg-[#2d112b]/80 border border-purple-800/60 text-purple-300 hover:bg-pink-900/30 hover:text-orange-200'}`}>全部</button>
                {[...categories].sort((a,b)=>a.sortOrder-b.sortOrder).map(c => (
                  <button key={c.id} onClick={() => setSelectedCategoryId(c.id)} className={`px-6 py-2.5 rounded-full text-sm font-bold whitespace-nowrap transition-all ${selectedCategoryId === c.id ? 'bg-gradient-to-r from-pink-600 to-orange-500 text-white shadow-[0_0_10px_rgba(249,115,22,0.4)]' : 'bg-[#2d112b]/80 border border-purple-800/60 text-purple-300 hover:bg-pink-900/30 hover:text-orange-200'}`}>{c.name}</button>
                ))}
              </div>
              <Input icon={Search} placeholder="搜尋酒水餐點..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full sm:w-64 flex-shrink-0" />
            </div>

            <div className="flex-grow overflow-y-auto p-5 custom-scrollbar bg-[#1c0c27]/40">
              <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-5 gap-5">
                {displayItems.map(item => {
                  const mkQty = getMakableQty(item);
                  const outOfStock = mkQty !== null && mkQty <= 0;
                  return (
                    <button
                      key={item.id} onClick={() => updateCart(item, 1)}
                      className={`bg-[#2d112b]/60 relative rounded-2xl text-left overflow-hidden flex flex-col min-h-[140px] border backdrop-blur-sm transition-all duration-300 ${
                        outOfStock ? 'border-pink-900/50 opacity-60 cursor-not-allowed' : 'border-pink-500/40 hover:border-orange-400 hover:shadow-[0_0_20px_rgba(249,115,22,0.4)] shadow-[0_0_10px_rgba(236,72,153,0.15)] group'
                      }`}
                    >
                      {/* Item Image Display */}
                      {item.imageUrl && (
                        <img 
                          src={item.imageUrl} 
                          alt={item.name} 
                          className="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity pointer-events-none" 
                          onError={(e) => e.target.style.display = 'none'}
                        />
                      )}
                      {item.imageUrl && <div className="absolute inset-0 bg-gradient-to-t from-[#120518]/95 via-[#120518]/60 to-transparent pointer-events-none"></div>}

                      {/* Price Top Right */}
                      <div className={`absolute top-0 right-0 text-white text-xs font-black px-4 py-1.5 rounded-bl-xl shadow-md z-10 ${outOfStock ? 'bg-purple-900' : 'bg-gradient-to-r from-orange-500 to-pink-600'}`}>
                        ${item.price}
                      </div>
                      
                      {/* Name and Qty Layout */}
                      <div className="relative z-10 p-4 flex flex-col h-full justify-between w-full">
                        <h3 className="font-bold text-orange-50 pr-12 text-base lg:text-lg leading-tight drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] mt-2">{item.name}</h3>
                        
                        {/* Makable Qty Bottom Left */}
                        <div className="mt-4">
                          {mkQty !== null ? (
                            <div className={`text-[11px] font-bold px-2.5 py-1.5 rounded-md w-fit drop-shadow-md border backdrop-blur-md ${outOfStock ? 'bg-[#120518]/80 text-pink-500 border-pink-900/50' : 'bg-[#120518]/80 text-orange-300 border-orange-500/30'}`}>
                              {outOfStock ? '庫存耗盡' : `可製作: ${mkQty} 份`}
                            </div>
                          ) : <div className="text-[10px] text-yellow-300 font-bold uppercase tracking-widest drop-shadow-md bg-[#120518]/80 border border-yellow-600/30 px-2 py-1.5 rounded-md w-fit">無限制供應</div>}
                        </div>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          </Card>

          {/* 下方：點餐明細區塊 */}
          <Card className="w-full flex-shrink-0 flex flex-col p-6 border-orange-500/30 shadow-[0_10px_40px_rgba(0,0,0,0.6)] h-auto">
            <div className="flex justify-between items-center mb-5 border-b border-pink-900/40 pb-4">
              <h2 className="text-xl font-black text-orange-100 flex items-center gap-3 drop-shadow-[0_0_8px_rgba(249,115,22,0.5)]">
                <Moon size={22} className="text-orange-400"/> 派對明細清單
              </h2>
              <div className="flex items-center gap-3">
                <button onClick={clearCart} className="bg-[#1c0c27]/80 hover:bg-pink-900 text-pink-400 hover:text-pink-200 text-xs px-3 py-2 rounded-lg border border-pink-900/50 flex items-center gap-1.5 transition-colors" title="清空">
                  <Trash2 size={14}/> 清空
                </button>
                <div className="flex items-center gap-2 bg-[#120518]/80 px-4 py-2 rounded-xl border border-purple-800/60 shadow-inner">
                  <Warehouse size={16} className="text-purple-400" />
                  <select value={selectedWarehouseId} onChange={e=>setSelectedWarehouseId(e.target.value)} className="bg-transparent text-orange-100 font-bold text-sm focus:outline-none">
                    {warehouses.map(w => <option key={w.id} value={w.id}>{w.name}</option>)}
                  </select>
                </div>
              </div>
            </div>
            
            <div className="flex flex-col lg:flex-row gap-6">
              {/* 左側：購物車列表 */}
              <div className="flex-grow flex flex-col h-full min-h-[160px]">
                 <div className="mb-4">
                  <Input value={guestName} onChange={e=>setGuestName(e.target.value)} placeholder="包廂號碼 / 貴賓名稱 *" className="w-full sm:w-64 font-bold text-lg" />
                </div>
                <div className="flex-grow bg-[#120518]/60 rounded-2xl p-3 space-y-2 border border-purple-900/40 shadow-inner overflow-y-auto custom-scrollbar">
                  {cart.length === 0 ? <p className="text-purple-500 text-center py-8 font-bold text-sm tracking-wider">清單是空的</p> : 
                    cart.map(item => (
                      <div key={item.id} className="flex justify-between items-center bg-[#2d112b]/80 p-3 rounded-xl border border-pink-900/30 shadow-sm hover:border-pink-500/50 transition-colors">
                        <div className="flex-grow pr-3 min-w-0">
                          <p className="text-base font-bold text-orange-50 truncate">{item.name}</p>
                          <p className="text-sm text-pink-400 font-mono mt-0.5">${item.price}</p>
                        </div>
                        <div className="flex items-center gap-3 bg-[#120518]/80 rounded-lg p-1.5 border border-purple-800/50 flex-shrink-0 shadow-inner">
                          <button onClick={() => updateCart(item, -1)} className="w-8 h-8 bg-[#2d112b] rounded hover:bg-purple-900 text-purple-200 flex items-center justify-center transition-colors">-</button>
                          <span className="w-6 text-center text-base font-bold text-orange-200">{item.qty}</span>
                          <button onClick={() => updateCart(item, 1)} className="w-8 h-8 bg-gradient-to-br from-pink-600 to-orange-500 rounded hover:from-pink-500 hover:to-orange-400 text-white flex items-center justify-center shadow-md transition-colors">+</button>
                        </div>
                      </div>
                    ))}
                </div>
              </div>

              {/* 右側：結帳資訊 */}
              <div className="w-full lg:w-80 flex-shrink-0 flex flex-col bg-[#1c0c27]/80 p-5 rounded-2xl border border-pink-900/40 shadow-[0_0_20px_rgba(236,72,153,0.1)]">
                {/* 所需材料區塊 */}
                <div className="mb-5 bg-[#120518]/80 rounded-xl p-3 border border-purple-900/50 shadow-inner">
                  <h4 className="text-[11px] font-bold text-purple-400 uppercase tracking-widest mb-3 flex items-center gap-1.5 border-b border-purple-900/50 pb-2">
                    <Package size={14} className="text-orange-400"/> 吧台耗材預估
                  </h4>
                  {Object.keys(cartUsage).length === 0 ? (
                    <p className="text-xs text-purple-600 text-center py-4 font-bold tracking-wider">目前無材料消耗紀錄</p>
                  ) : (
                    <div className="space-y-2 pr-1 max-h-24 overflow-y-auto custom-scrollbar">
                      {Object.entries(cartUsage).map(([ingId, qty]) => {
                        const ing = ingredients.find(i => i.id === ingId);
                        const wStock = getStockForWarehouse(ing || {}, selectedWarehouseId);
                        const isShort = wStock < qty;
                        return (
                          <div key={ingId} className="flex justify-between items-center text-xs bg-[#2d112b]/60 px-2.5 py-2 rounded-lg border border-purple-800/40 shadow-sm">
                            <span className="text-purple-200 truncate pr-2">{ing?.name || '未知'}</span>
                            <span className={`font-mono font-bold flex-shrink-0 flex items-center gap-1.5 ${isShort ? 'text-pink-400' : 'text-orange-300'}`}>
                              {qty} 單位 {isShort && <span className="text-[10px] bg-pink-950/80 text-pink-400 border border-pink-900/50 px-1.5 rounded shadow-sm">缺</span>}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

                <div className="space-y-3 pt-4 border-t border-purple-900/50 flex-shrink-0">
                  <div className="flex justify-between text-purple-300 text-sm font-mono"><span>Subtotal</span><span>${cartTotals.subtotal}</span></div>
                  <select value={selectedActivityId} onChange={e=>setSelectedActivityId(e.target.value)} className="w-full bg-[#120518]/80 border border-purple-800/60 text-orange-100 px-3 py-2.5 rounded-xl text-sm focus:border-orange-500 shadow-inner">
                    <option value="none">無活動折扣</option>
                    {activeActs.map(a => <option key={a.id} value={a.id}>{a.name} ({a.type==='percent'?`${a.value}%`:`-$${a.value}`})</option>)}
                  </select>
                  {cartTotals.discount > 0 && <div className="flex justify-between text-yellow-400 text-sm font-bold font-mono pt-1"><span>Discount</span><span>-${Math.round(cartTotals.discount)}</span></div>}
                  
                  <div className="flex justify-between items-end pt-3 border-t border-purple-900/50 mt-3">
                    <span className="text-purple-300 font-bold uppercase tracking-widest text-sm mb-1">Total</span>
                    <span className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-pink-500 font-mono drop-shadow-[0_0_8px_rgba(249,115,22,0.5)]">${Math.round(cartTotals.total)}</span>
                  </div>

                  <Button onClick={processOrder} disabled={cart.length===0 || !guestName.trim() || isProcessing} className="w-full py-3.5 mt-4 text-lg shadow-[0_5px_20px_rgba(249,115,22,0.4)]">
                    {isProcessing ? 'PROCESSING...' : '確認送單'}
                  </Button>
                </div>
              </div>
            </div>
          </Card>
        </div>
      );
    };

    const OrdersView = () => {
      const { orders, warehouses, showAlert } = useAppContext();

      const handleCopyBill = (o) => {
        const whName = warehouses.find(w => w.id === o.warehouseId)?.name || '未指定吧台';
        const text = `=== 霞落之境 帳單 ===\n時間: ${new Date(o.timestamp).toLocaleString()}\n包廂/客人: ${o.guestName}\n出餐庫存: ${whName}\n-------------------\n${o.items.map(i=>`${i.name} x${i.qty}  $${i.price*i.qty}`).join('\n')}\n-------------------\n小計: $${o.subtotal}\n折扣: -$${Math.round(o.discountAmount || 0)}\n總計: $${Math.round(o.total)}\n===================`;
        copyToClipboard(text);
        showAlert("📝 帳單文字已成功複製到剪貼簿！");
      };

      return (
        <Card>
          <h2 className="text-xl font-bold text-orange-100 mb-6 flex items-center gap-2"><ListOrdered className="text-pink-500"/> 記帳歷史紀錄</h2>
          <div className="overflow-x-auto custom-scrollbar border border-purple-900/50 rounded-2xl bg-[#120518]/60 shadow-inner">
            <table className="w-full text-left border-collapse">
              <thead>
                <tr className="bg-[#1c0c27]/80 border-b border-pink-900/40">
                  <th className="p-4 text-purple-300 font-bold text-sm tracking-wider">時間</th>
                  <th className="p-4 text-purple-300 font-bold text-sm tracking-wider">包廂/客人</th>
                  <th className="p-4 text-purple-300 font-bold text-sm tracking-wider">明細</th>
                  <th className="p-4 text-purple-300 font-bold text-sm tracking-wider text-right">小計</th>
                  <th className="p-4 text-yellow-500/80 font-bold text-sm tracking-wider text-right">折扣</th>
                  <th className="p-4 text-orange-400 font-bold text-sm tracking-wider text-right">實收</th>
                  <th className="p-4 text-purple-300 font-bold text-sm tracking-wider text-center">操作</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-purple-900/40">
                {orders.map(o => (
                  <tr key={o.id} className="hover:bg-[#2d112b]/60 transition-colors">
                    <td className="p-4 text-sm text-purple-400 font-mono">{new Date(o.timestamp).toLocaleString()}</td>
                    <td className="p-4 font-bold text-orange-100">
                      {o.guestName}
                      {o.warehouseId && <div className="text-[10px] text-purple-500 mt-1"><Warehouse size={10} className="inline mr-1"/>{warehouses.find(w=>w.id===o.warehouseId)?.name || '未知'}</div>}
                    </td>
                    <td className="p-4 text-sm text-purple-300 max-w-xs truncate" title={o.items.map(i=>`${i.name}x${i.qty}`).join(', ')}>{o.items.map(i => `${i.name}x${i.qty}`).join(', ')}</td>
                    <td className="p-4 text-right text-purple-400 font-mono">${o.subtotal}</td>
                    <td className="p-4 text-right text-yellow-500/80 font-mono">-{Math.round(o.discountAmount || 0)}</td>
                    <td className="p-4 text-right font-black text-pink-400 font-mono">${Math.round(o.total)}</td>
                    <td className="p-4 text-center">
                      <button onClick={() => handleCopyBill(o)} className="text-purple-400 hover:text-orange-300 bg-[#120518] hover:bg-pink-900/40 p-2 rounded-lg border border-purple-800/60 transition-all" title="複製帳單">
                        <Copy size={16}/>
                      </button>
                    </td>
                  </tr>
                ))}
                {orders.length === 0 && <tr><td colSpan="7" className="text-center p-10 text-purple-600 font-bold tracking-widest">尚無訂單紀錄</td></tr>}
              </tbody>
            </table>
          </div>
        </Card>
      );
    };

    const MenuManager = () => {
      const { categories, items, ingredients, showAlert, showConfirm, showEdit, logAction, systemConfig, ingredientMap, categoryMap } = useAppContext();
      const [activeTab, setActiveTab] = useState('items'); 
      const [searchQuery, setSearchQuery] = useState('');
      
      const [catName, setCatName] = useState('');
      const [itemData, setItemData] = useState({ name: '', price: '', cat: '', recipe: [], imageUrl: '' });
      const [ingSelection, setIngSelection] = useState({ id: '', qty: '' });
      const [editingItemId, setEditingItemId] = useState(null);

      const sortedCats = [...categories].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
      const sortedItems = [...items].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0)).filter(i => i.name.toLowerCase().includes(searchQuery.toLowerCase()));

      const handleAction = async (action, logMsg) => {
        await action();
        if (logMsg) logAction(logMsg.split(':')[0], logMsg);
      };

      const addCat = () => {
        if (!catName.trim()) return;
        handleAction(async () => { await addDoc(getCollRef('bar_categories'), { name: catName, sortOrder: categories.length }); setCatName(''); }, `新增分類: ${catName}`);
      };

      const editCat = (cat) => showEdit({
        title: '編輯分類', fields: [{ key: 'name', label: '名稱', defaultValue: cat.name }],
        onSave: (v) => { if (v.name) handleAction(() => updateDoc(getDocRef('bar_categories', cat.id), { name: v.name }), `編輯分類: ${v.name}`); }
      });

      const delCat = (id, name) => showConfirm('確定刪除分類？', () => handleAction(() => deleteDoc(getDocRef('bar_categories', id)), `刪除分類: ${name}`));

      const saveItem = () => {
        if (!itemData.name || !itemData.price || !itemData.cat) return showAlert('填寫完整資訊 (分類、名稱、價格)');
        handleAction(async () => {
          const payload = {
            name: itemData.name, price: Number(itemData.price), categoryId: itemData.cat, 
            recipe: itemData.recipe, imageUrl: itemData.imageUrl || '' 
          };
          if (editingItemId) {
            await updateDoc(getDocRef('bar_items', editingItemId), payload);
          } else {
            await addDoc(getCollRef('bar_items'), { ...payload, sortOrder: items.length });
          }
          setItemData({ name: '', price: '', cat: '', recipe: [], imageUrl: '' });
          setEditingItemId(null);
        }, `${editingItemId ? '編輯' : '新增'}品項: ${itemData.name}`);
      };

      const startEditItem = (item) => {
        setItemData({
          name: item.name, price: item.price, cat: item.categoryId,
          recipe: item.recipe || [], imageUrl: item.imageUrl || ''
        });
        setEditingItemId(item.id);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const cancelEdit = () => {
        setItemData({ name: '', price: '', cat: '', recipe: [], imageUrl: '' });
        setEditingItemId(null);
      };

      const delItem = (id, name) => showConfirm('確定刪除品項？', () => handleAction(() => deleteDoc(getDocRef('bar_items', id)), `刪除品項: ${name}`));

      const reorder = async (collectionStr, list) => {
        list.forEach((item, idx) => { if(item.sortOrder !== idx) updateDoc(getDocRef(collectionStr, item.id), { sortOrder: idx }); });
      };

      return (
        <Card className="max-w-5xl mx-auto">
          <div className="flex border-b border-pink-900/40 mb-8">
            <button onClick={() => setActiveTab('items')} className={`px-8 py-3.5 font-bold border-b-2 tracking-wider transition-colors ${activeTab === 'items' ? 'border-orange-500 text-orange-400' : 'border-transparent text-purple-400 hover:text-orange-200'}`}>酒水與餐點管理</button>
            <button onClick={() => setActiveTab('categories')} className={`px-8 py-3.5 font-bold border-b-2 tracking-wider transition-colors ${activeTab === 'categories' ? 'border-orange-500 text-orange-400' : 'border-transparent text-purple-400 hover:text-orange-200'}`}>大分類管理</button>
          </div>

          {activeTab === 'categories' && (
            <div>
              <div className="flex gap-4 mb-8 bg-[#1c0c27]/60 p-5 rounded-2xl border border-purple-800/50 shadow-inner">
                <Input value={catName} onChange={e=>setCatName(e.target.value)} placeholder="新分類名稱" className="flex-grow" />
                <Button onClick={addCat}><Plus size={18}/> 新增分類</Button>
              </div>
              <DraggableList items={sortedCats} onReorder={(l) => reorder('bar_categories', l)} renderItem={cat => (
                <div className="flex justify-between items-center w-full group">
                  <span className="font-bold text-orange-100 group-hover:text-pink-400 transition-colors">{cat.name}</span>
                  <div className="flex gap-2">
                    <button onClick={() => editCat(cat)} className="text-purple-400 hover:text-yellow-400 p-2.5 bg-[#120518] rounded-lg transition-colors"><Edit size={16}/></button>
                    <button onClick={() => delCat(cat.id, cat.name)} className="text-purple-400 hover:text-pink-500 p-2.5 bg-[#120518] rounded-lg transition-colors"><Trash2 size={16}/></button>
                  </div>
                </div>
              )}/>
            </div>
          )}

          {activeTab === 'items' && (
            <div>
              <div className={`p-6 rounded-2xl border mb-8 shadow-[inset_0_0_20px_rgba(0,0,0,0.5)] transition-colors duration-500 ${editingItemId ? 'bg-[#3a1538]/60 border-orange-500/50' : 'bg-[#1c0c27]/60 border-purple-800/50'}`}>
                <h3 className={`text-sm font-bold mb-4 flex items-center gap-2 tracking-wider uppercase ${editingItemId ? 'text-orange-400' : 'text-purple-300'}`}>
                  {editingItemId ? <Edit size={16}/> : <Plus size={16}/>} 
                  {editingItemId ? `正在編輯：${itemData.name}` : '新增酒水/餐點與配方設定'}
                </h3>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-5 mb-5">
                  <select value={itemData.cat} onChange={e=>setItemData({...itemData, cat: e.target.value})} className="bg-[#120518]/80 border border-purple-800/60 text-orange-100 px-4 py-2.5 rounded-xl focus:border-orange-500">
                    <option value="" disabled>選擇分類...</option>
                    {sortedCats.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                  <Input value={itemData.name} onChange={e=>setItemData({...itemData, name: e.target.value})} placeholder="餐點/調酒名稱 *" className="md:col-span-2" />
                  <Input type="number" value={itemData.price} onChange={e=>setItemData({...itemData, price: e.target.value})} placeholder="售價 $ *" />
                  <Input value={itemData.imageUrl} onChange={e=>setItemData({...itemData, imageUrl: e.target.value})} placeholder="餐點圖片網址 URL (選填，可留空)" icon={ImageIcon} className="md:col-span-4" />
                </div>
                
                <div className="border-t border-purple-900/50 pt-5 bg-[#120518]/40 p-5 rounded-xl">
                  <h4 className="text-xs font-bold text-yellow-500/90 mb-4 uppercase tracking-wider">綁定出餐扣除的食材庫存</h4>
                  <div className="flex flex-wrap md:flex-nowrap gap-4 mb-4">
                    <select value={ingSelection.id} onChange={e=>setIngSelection({...ingSelection, id: e.target.value})} className="flex-grow bg-[#1a0a24]/80 border border-purple-800/60 text-orange-100 px-4 py-2.5 rounded-xl text-sm">
                      <option value="" disabled>選擇庫存食材...</option>
                      {ingredients.map(ig => <option key={ig.id} value={ig.id}>{ig.name} (本:${ig.cost})</option>)}
                    </select>
                    <Input type="number" value={ingSelection.qty} onChange={e=>setIngSelection({...ingSelection, qty: e.target.value})} placeholder="單次用量" className="w-28" />
                    <Button variant="outline" onClick={() => {
                      if(!ingSelection.id || !ingSelection.qty) return;
                      const ing = ingredients.find(i=>i.id===ingSelection.id);
                      setItemData(p => ({...p, recipe: [...p.recipe, { ingredientId: ing.id, name: ing.name, qty: Number(ingSelection.qty) }]}));
                      setIngSelection({id:'', qty:''});
                    }}>加入配方</Button>
                  </div>
                  <div className="flex flex-wrap gap-2.5">
                    {itemData.recipe.map((r, i) => (
                      <div key={i} className="bg-[#2d112b]/80 border border-pink-900/50 rounded-lg px-3.5 py-1.5 text-sm flex items-center gap-3 shadow-sm">
                        <span className="text-purple-200">{r.name} <span className="text-pink-400 font-bold">x{r.qty}</span></span>
