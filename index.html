                        <button onClick={() => setItemData(p => ({...p, recipe: p.recipe.filter((_, idx)=>idx!==i)}))} className="text-purple-500 hover:text-pink-400"><X size={14}/></button>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="flex justify-end gap-4 mt-6">
                  {editingItemId && <Button variant="outline" onClick={cancelEdit}>取消編輯</Button>}
                  <Button variant={editingItemId ? 'secondary' : 'primary'} onClick={saveItem} className="px-10 shadow-[0_0_20px_rgba(249,115,22,0.4)]">
                    {editingItemId ? '儲存配方更新' : '建立新選單'}
                  </Button>
                </div>
              </div>

              <div className="flex justify-between items-end mb-5">
                <h3 className="text-sm font-bold text-purple-400 uppercase tracking-widest pl-2">拖曳左側可排序</h3>
                <Input icon={Search} placeholder="搜尋現有品項..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-64" />
              </div>
              
              <DraggableList items={sortedItems} onReorder={(l) => reorder('bar_items', l)} renderItem={item => {
                const cost = item.recipe && !systemConfig.ignoreAllCosts ? item.recipe.reduce((s, r) => s + ((ingredientMap[r.ingredientId]?.cost||0) * r.qty), 0) : 0;
                return (
                  <div className={`flex justify-between items-center w-full group ${editingItemId === item.id ? 'opacity-50' : ''}`}>
                    <div className="min-w-0 pr-4 flex items-center gap-4">
                      {item.imageUrl ? (
                        <img src={item.imageUrl} alt="" className="w-12 h-12 rounded-xl object-cover border border-pink-900/50 bg-[#120518]" onError={(e)=>e.target.style.display='none'}/>
                      ) : <div className="w-12 h-12 rounded-xl bg-[#120518]/60 border border-purple-900/50 flex items-center justify-center text-purple-600"><ImageIcon size={20}/></div>}
                      <div>
                        <div className="flex items-center gap-3 mb-1">
                          <span className="font-bold text-orange-50 text-lg truncate group-hover:text-orange-400 transition-colors">{item.name}</span>
                          <span className="text-[10px] bg-[#120518]/80 text-purple-300 px-2.5 py-1 rounded-md border border-purple-800/50 truncate tracking-widest">{categoryMap[item.categoryId]?.name || '未分類'}</span>
                        </div>
                        <div className="text-xs text-purple-400/80 truncate font-mono">
                          {item.recipe?.length > 0 ? item.recipe.map(r=>`${r.name}x${r.qty}`).join(' | ') : <span className="text-yellow-600/80 font-bold font-sans">無綁定配方</span>}
                        </div>
                      </div>
                    </div>
                    <div className="flex items-center gap-4 md:gap-6 text-sm flex-shrink-0">
                      <div className="text-right font-mono">
                        <p className="text-orange-200 font-bold text-base">${item.price}</p>
                        <p className="text-pink-500/80 text-[11px] text-right">本:${cost}</p>
                      </div>
                      <div className="flex gap-2 border-l border-purple-800/50 pl-4">
                        <button onClick={() => startEditItem(item)} className="text-purple-400 hover:text-yellow-400 p-2.5 bg-[#120518] rounded-lg transition-colors"><Edit size={16}/></button>
                        <button onClick={() => delItem(item.id, item.name)} className="text-purple-400 hover:text-pink-500 p-2.5 bg-[#120518] rounded-lg transition-colors"><Trash2 size={16}/></button>
                      </div>
                    </div>
                  </div>
                );
              }}/>
            </div>
          )}
        </Card>
      );
    };

    const DraggableList = ({ items, onReorder, renderItem }) => {
      const [draggedIdx, setDraggedIdx] = useState(null);
      const handleDrag = (e, idx, type) => {
        if(type === 'start') { setDraggedIdx(idx); e.dataTransfer.effectAllowed='move'; }
        if(type === 'enter' && draggedIdx !== null && draggedIdx !== idx) {
          const newItems = [...items];
          newItems.splice(idx, 0, newItems.splice(draggedIdx, 1)[0]);
          setDraggedIdx(idx); onReorder(newItems);
        }
        if(type === 'end') setDraggedIdx(null);
      };
      return <div className="space-y-3">{items.map((item, i) => (
        <div key={item.id} draggable onDragStart={e=>handleDrag(e,i,'start')} onDragEnter={e=>handleDrag(e,i,'enter')} onDragEnd={e=>handleDrag(e,i,'end')} onDragOver={e=>e.preventDefault()} className="flex items-stretch bg-[#1c0c27]/80 border border-purple-800/40 rounded-2xl group hover:border-pink-500/50 shadow-sm transition-colors">
          <div className="px-4 flex items-center bg-[#120518]/60 border-r border-purple-900/50 cursor-grab active:cursor-grabbing text-purple-600 hover:text-pink-500 rounded-l-2xl transition-colors"><GripVertical size={20}/></div>
          <div className="flex-grow p-4 min-w-0">{renderItem(item)}</div>
        </div>
      ))}</div>;
    };

    const InventoryManager = () => {
      const { ingredients, items, warehouses, showAlert, showEdit, logAction, systemConfig, ingredientMap } = useAppContext();
      const [activeTab, setActiveTab] = useState('inventory'); 
      
      const [newIng, setNewIng] = useState({ name: '', cost: '', ignore: false });
      const [stockOp, setStockOp] = useState({ id: '', qty: '', totalSpent: '', reason: '一般進貨', warehouseId: warehouses[0]?.id || 'default' });
      
      const [calcItem, setCalcItem] = useState('');
      const [calcPortions, setCalcPortions] = useState(10);

      const addIng = async () => {
        if (!newIng.name || !newIng.cost) return showAlert("請填寫食材名稱與基礎成本");
        await addDoc(getCollRef('bar_ingredients'), { name: newIng.name, stock: 0, cost: Number(newIng.cost), ignoreCost: newIng.ignore });
        logAction('新增食材', `新增: ${newIng.name}`);
        setNewIng({ name: '', cost: '', ignore: false });
      };

      const addStock = async () => {
        if (!stockOp.id || !stockOp.qty) return showAlert("請選擇食材與變動數量");
        const ing = ingredients.find(i => i.id === stockOp.id);
        if (!ing) return;
        
        const qty = Number(stockOp.qty);
        const totalSpent = Number(stockOp.totalSpent);
        const inputUnitCost = (qty > 0 && stockOp.totalSpent !== '') ? (totalSpent / qty) : 0;
        
        const oldStock = ing.stock || 0;
        const oldCost = ing.cost || 0;
        const newStockTotal = oldStock + qty;
        
        const oldStocksMap = ing.stocks || { default: oldStock };
        const targetWId = stockOp.warehouseId;
        const newStocksMap = { ...oldStocksMap, [targetWId]: (oldStocksMap[targetWId] || 0) + qty };
        
        let finalCost = oldCost;
        if (qty > 0 && inputUnitCost > 0 && newStockTotal > 0) {
          const totalOldVal = oldStock * oldCost;
          const totalNewVal = totalSpent;
          finalCost = Math.round((totalOldVal + totalNewVal) / newStockTotal);
        } else if (inputUnitCost > 0 && qty <= 0) {
          finalCost = inputUnitCost;
        }

        await updateDoc(getDocRef('bar_ingredients', ing.id), { stock: newStockTotal, stocks: newStocksMap, cost: finalCost });
        
        const whName = warehouses.find(w => w.id === targetWId)?.name || '未知吧台';
        await addDoc(getCollRef('bar_inventory'), { 
          ingredientId: ing.id, ingredientName: ing.name, changeQty: qty, 
          reason: stockOp.reason, costPerItem: inputUnitCost > 0 ? inputUnitCost : oldCost, 
          warehouseId: targetWId, timestamp: Date.now() 
        });
        
        let logMsg = `[${whName}] ${ing.name} ${qty > 0 ? '+' : ''}${qty} (事由: ${stockOp.reason})`;
        if (qty > 0 && totalSpent > 0) logMsg += ` / 公款扣除: $${totalSpent}`;
        logAction('庫存調整', logMsg);
        
        setStockOp({ id: '', qty: '', totalSpent: '', reason: '一般進貨', warehouseId: stockOp.warehouseId });
      };

      const editIng = (ing) => showEdit({
        title: '編輯庫存設定', fields: [{ key: 'name', label: '名稱', defaultValue: ing.name }, { key: 'cost', type: 'number', label: '強制覆寫成本', defaultValue: ing.cost }, { key: 'ignore', type: 'checkbox', label: '無視此成本', defaultValue: ing.ignoreCost||false }],
        onSave: (v) => { if(v.name&&v.cost) { updateDoc(getDocRef('bar_ingredients', ing.id), { name: v.name, cost: Number(v.cost), ignoreCost: v.ignore }); logAction('編輯食材', `更新 ${v.name}`); } }
      });

      const deleteIng = (ing) => {
        showConfirm(`確定要永久刪除項目「${ing.name}」嗎？這將無法復原。`, async () => {
          await deleteDoc(getDocRef('bar_ingredients', ing.id));
          logAction('刪除食材', `刪除了: ${ing.name}`);
        });
      };

      const clearAllIngs = () => {
        if(ingredients.length === 0) return showAlert('目前沒有任何資料。');
        showConfirm('⚠️ 警告：確定要清空「所有」庫存資料嗎？此操作將不可逆！', () => {
          showConfirm('【最終危險確認】請再次確認，您真的要刪除全部庫存嗎？', async () => {
            const batch = writeBatch(db);
            ingredients.forEach(ing => batch.delete(getDocRef('bar_ingredients', ing.id)));
            await batch.commit();
            logAction('危險操作', '清空了所有食材資料');
            showAlert('已成功清空所有庫存紀錄。');
          });
        });
      };

      const selectedRecipeItem = useMemo(() => items.find(i => i.id === calcItem), [calcItem, items]);

      return (
        <div className="space-y-6">
          <div className="flex border-b border-pink-900/40 mb-4 max-w-7xl mx-auto">
            <button onClick={() => setActiveTab('inventory')} className={`px-8 py-3.5 font-bold border-b-2 tracking-wider transition-colors ${activeTab === 'inventory' ? 'border-orange-500 text-orange-400' : 'border-transparent text-purple-400 hover:text-orange-200'}`}>庫存進退貨</button>
            <button onClick={() => setActiveTab('calculator')} className={`px-8 py-3.5 font-bold border-b-2 flex items-center gap-2 tracking-wider transition-colors ${activeTab === 'calculator' ? 'border-yellow-400 text-yellow-400' : 'border-transparent text-purple-400 hover:text-orange-200'}`}><Calculator size={16}/> 採購預測計算機</button>
          </div>

          {activeTab === 'inventory' && (
            <div className="grid grid-cols-1 xl:grid-cols-3 gap-6 max-w-7xl mx-auto">
              <div className="xl:col-span-1 space-y-6">
                <Card className="border-purple-800/50">
                  <h2 className="text-lg font-bold text-orange-100 mb-5 border-b border-purple-900/50 pb-3"><span className="text-pink-500 font-black pr-2">1.</span>建立新材料種類</h2>
                  <div className="space-y-4">
                    <Input value={newIng.name} onChange={e=>setNewIng({...newIng,name:e.target.value})} placeholder="材料名稱 (例: 伏特加)" />
                    <Input type="number" value={newIng.cost} onChange={e=>setNewIng({...newIng,cost:e.target.value})} placeholder="初始單件成本 $" />
                    <label className="flex items-center gap-3 p-3 bg-[#120518]/60 rounded-xl cursor-pointer text-sm text-purple-300 border border-purple-900/50 hover:bg-pink-900/20 transition-colors">
                      <input type="checkbox" checked={newIng.ignore} onChange={e=>setNewIng({...newIng,ignore:e.target.checked})} className="w-4 h-4 accent-pink-600 rounded"/>
                      暫時不計算此成本
                    </label>
                    <Button onClick={addIng} className="w-full shadow-lg mt-2">建立項目</Button>
                  </div>
                </Card>

                <Card className="border-orange-500/30 shadow-[0_0_20px_rgba(249,115,22,0.1)]">
                  <h2 className="text-lg font-bold text-orange-100 mb-5 border-b border-purple-900/50 pb-3"><span className="text-pink-500 font-black pr-2">2.</span>進出貨與公帳扣除作業</h2>
                  <div className="space-y-4">
                    <div className="flex items-center gap-3 mb-2 bg-[#120518] p-3 rounded-xl border border-purple-800/60 shadow-inner">
                      <Warehouse size={18} className="text-purple-400" />
                      <select value={stockOp.warehouseId} onChange={e=>setStockOp({...stockOp, warehouseId: e.target.value})} className="w-full bg-transparent text-orange-100 focus:outline-none font-bold text-sm">
                        {warehouses.map(w => <option key={w.id} value={w.id}>{w.name}</option>)}
                      </select>
                    </div>
                    
                    <select value={stockOp.id} onChange={e=>setStockOp({...stockOp,id:e.target.value})} className="w-full bg-[#1c0c27]/80 border border-purple-800/60 text-orange-100 px-4 py-3 rounded-xl focus:border-orange-500">
                      <option value="" disabled>請選擇要進退貨的項目...</option>
                      {[...ingredients].sort((a,b)=>a.name.localeCompare(b.name)).map(i => {
                        const wStock = getStockForWarehouse(i, stockOp.warehouseId);
                        return <option key={i.id} value={i.id}>{i.name} (所選庫存: {wStock})</option>
                      })}
                    </select>
                    
                    <div className="flex gap-3">
                      <Input type="number" value={stockOp.qty} onChange={e=>setStockOp({...stockOp,qty:e.target.value})} placeholder="數量 (+/-)" className="w-1/2" />
                      <Input type="number" value={stockOp.totalSpent} onChange={e=>setStockOp({...stockOp,totalSpent:e.target.value})} placeholder="總花費(公款) $" className="w-1/2" />
                    </div>
                    {Number(stockOp.qty) > 0 && stockOp.totalSpent !== '' && (
                      <div className="text-[11px] text-yellow-300 font-bold bg-[#120518]/80 p-2.5 rounded-lg border border-yellow-600/30 tracking-wider">
                        系統結算本次單位成本: ${(Number(stockOp.totalSpent) / Number(stockOp.qty)).toFixed(2)} / 件
                      </div>
                    )}
                    <Input value={stockOp.reason} onChange={e=>setStockOp({...stockOp,reason:e.target.value})} placeholder="變動事由 (例: 廠商進貨)" />
                    <Button onClick={addStock} variant="secondary" className="w-full shadow-lg mt-2">送出變動並記錄</Button>
                  </div>
                </Card>
              </div>

              <Card className="xl:col-span-2 border-purple-800/50 p-0 overflow-hidden flex flex-col">
                <div className="flex justify-between items-center p-6 border-b border-purple-900/60 bg-[#1c0c27]/80 backdrop-blur-md">
                  <h2 className="text-lg font-bold text-orange-100">當前各項庫存狀態</h2>
                  <Button variant="danger" onClick={clearAllIngs} className="text-[11px] px-4 py-1.5 shadow-md border-pink-900"><Trash2 size={14}/> 刪除全部</Button>
                </div>
                <div className="overflow-y-auto flex-grow custom-scrollbar">
                  <table className="w-full text-left">
                    <thead className="bg-[#120518]/90 sticky top-0 z-10 text-[11px] uppercase tracking-widest text-purple-400 font-bold shadow-md backdrop-blur-md">
                      <tr>
                        <th className="p-4 pl-6 border-b border-purple-900/60">項目名稱</th>
                        <th className="p-4 border-b border-purple-900/60">庫存餘額 (各區)</th>
                        <th className="p-4 border-b border-purple-900/60 text-right">單位均價</th>
                        <th className="p-4 border-b border-purple-900/60 text-right">總價值</th>
                        <th className="p-4 pr-6 border-b border-purple-900/60 text-center">操作</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-purple-900/30 font-mono text-sm bg-[#1c0c27]/40">
                      {[...ingredients].sort((a,b)=>a.name.localeCompare(b.name)).map(ing => {
                        const totalStock = ing.stock || 0;
                        const isLow = totalStock <= 5;
                        const ignore = systemConfig.ignoreAllCosts || ing.ignoreCost;
                        return (
                          <tr key={ing.id} className={`hover:bg-[#2d112b]/60 transition-colors ${isLow ? 'bg-pink-900/10' : ''}`}>
                            <td className="p-4 pl-6 font-bold text-orange-50 font-sans flex items-center gap-2.5">
                              {isLow && <AlertTriangle size={14} className="text-pink-500 drop-shadow-[0_0_5px_#ec4899]"/>} {ing.name}
                            </td>
                            <td className="p-4">
                              <div className={`font-black mb-1.5 ${isLow ? 'text-pink-400' : 'text-orange-300'}`}>總量: {totalStock}</div>
                              <div className="flex flex-wrap gap-1.5 text-[10px] text-purple-300 font-sans">
                                {warehouses.map(w => {
                                  const wStock = getStockForWarehouse(ing, w.id);
                                  return wStock > 0 ? <span key={w.id} className="bg-[#120518]/80 border border-purple-800/60 px-2 py-0.5 rounded-md">{w.name}: {wStock}</span> : null;
                                })}
                              </div>
                            </td>
                            <td className="p-4 text-right text-purple-300">
                              {ignore ? <span className="line-through text-purple-600">${ing.cost || 0}</span> : `$${ing.cost || 0}`}
                            </td>
                            <td className="p-4 text-right font-bold text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.3)]">{ignore ? '$0' : `$${totalStock * (ing.cost || 0)}`}</td>
                            <td className="p-4 pr-6 text-center">
                              <div className="flex justify-center gap-1.5">
                                <button onClick={() => editIng(ing)} className="text-purple-400 hover:text-yellow-400 bg-[#120518] p-2 rounded-lg transition-colors" title="編輯"><Edit size={16}/></button>
                                <button onClick={() => deleteIng(ing)} className="text-purple-400 hover:text-pink-500 bg-[#120518] p-2 rounded-lg transition-colors" title="刪除"><Trash2 size={16}/></button>
                              </div>
                            </td>
                          </tr>
                      )})}
                      {ingredients.length === 0 && <tr><td colSpan="5" className="text-center p-10 text-purple-600 font-sans tracking-wider">尚無庫存資料</td></tr>}
                    </tbody>
                  </table>
                </div>
              </Card>
            </div>
          )}

          {activeTab === 'calculator' && (
            <div className="max-w-4xl mx-auto">
              <Card className="border-yellow-600/30 shadow-[0_0_40px_rgba(250,204,21,0.15)] relative overflow-hidden">
                <div className="absolute top-[-40px] right-[-40px] opacity-[0.03] text-yellow-500 pointer-events-none"><Calculator size={300}/></div>
                <div className="relative z-10">
                  <h2 className="text-2xl font-black text-orange-100 mb-3 flex items-center gap-3"><Calculator className="text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]"/> 採購需求預測</h2>
                  <p className="text-purple-300 text-sm mb-8 leading-relaxed">選擇特定餐點或酒水，並輸入預計要銷售的份數，系統將自動展開配方並幫您計算所需採購的耗材與初估花費。</p>

                  <div className="flex flex-col md:flex-row gap-5 mb-8 bg-[#120518]/60 p-5 rounded-2xl border border-purple-800/50 backdrop-blur-md shadow-inner">
                    <div className="flex-grow">
                      <label className="block text-[11px] text-purple-400 uppercase font-bold mb-2 tracking-widest">目標品項 Target Item</label>
                      <select value={calcItem} onChange={e=>setCalcItem(e.target.value)} className="w-full bg-[#1c0c27]/80 border border-purple-800/60 text-orange-100 px-5 py-3.5 rounded-xl focus:border-yellow-500 text-lg font-bold shadow-sm">
                        <option value="">-- 請選擇品項 --</option>
                        {[...items].filter(i=>i.recipe?.length>0).sort((a,b)=>a.name.localeCompare(b.name)).map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
                      </select>
                    </div>
                    <div className="w-full md:w-56">
                      <label className="block text-[11px] text-purple-400 uppercase font-bold mb-2 tracking-widest">目標份數 Portions</label>
                      <Input type="number" value={calcPortions} onChange={e=>setCalcPortions(Math.max(1, e.target.value))} className="w-full text-center text-xl font-bold py-3.5" />
                    </div>
                  </div>

                  {selectedRecipeItem ? (
                    <div className="bg-[#120518]/80 rounded-2xl border border-purple-800/50 overflow-hidden shadow-lg">
                      <div className="p-5 bg-[#1c0c27]/80 border-b border-purple-900/60 flex justify-between items-center">
                        <h3 className="font-bold text-orange-100 text-lg">{selectedRecipeItem.name} <span className="text-sm font-normal text-purple-400 ml-2">x {calcPortions} 份的展開明細</span></h3>
                      </div>
                      <table className="w-full text-left text-sm font-mono">
                        <thead className="bg-[#120518] text-purple-400 text-[11px] uppercase tracking-widest">
                          <tr>
                            <th className="p-4 pl-6 border-b border-purple-900/50 font-sans font-bold">所需耗材</th>
                            <th className="p-4 border-b border-purple-900/50 text-right">需求總量</th>
                            <th className="p-4 border-b border-purple-900/50 text-right">總庫存</th>
                            <th className="p-4 border-b border-purple-900/50 text-right text-pink-400 bg-pink-950/10">缺口數量</th>
                            <th className="p-4 pr-6 border-b border-purple-900/50 text-right text-yellow-400 bg-yellow-950/10">預估採購額</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-purple-900/30">
                          {selectedRecipeItem.recipe.map(req => {
                            const ing = ingredientMap[req.ingredientId];
                            const requiredQty = req.qty * calcPortions;
                            const currentStock = ing ? (ing.stock || 0) : 0;
                            const shortage = Math.max(0, requiredQty - currentStock);
                            const estCost = shortage * (ing?.cost || 0);
                            return (
                              <tr key={req.ingredientId} className="hover:bg-[#1c0c27]/60 transition-colors">
                                <td className="p-4 pl-6 font-sans text-orange-50 font-bold">{req.name} <span className="text-[10px] text-purple-400 bg-[#120518] px-1.5 py-0.5 rounded ml-2 border border-purple-800/50">配方:x{req.qty}</span></td>
                                <td className="p-4 text-right text-purple-200">{requiredQty}</td>
                                <td className="p-4 text-right text-orange-300">{currentStock}</td>
                                <td className="p-4 text-right font-black text-pink-500 bg-pink-950/10">{shortage > 0 ? shortage : '-'}</td>
                                <td className="p-4 pr-6 text-right font-bold text-yellow-400 bg-yellow-950/10">${estCost}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                        <tfoot className="bg-[#120518] border-t-2 border-purple-800/60">
                          <tr>
                            <td colSpan="4" className="p-5 text-right font-sans font-black text-purple-300">總計預估採購預算：</td>
                            <td className="p-5 pr-6 text-right font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-orange-400 text-xl drop-shadow-[0_0_5px_rgba(250,204,21,0.5)]">
                              ${selectedRecipeItem.recipe.reduce((sum, req) => {
                                const ing = ingredientMap[req.ingredientId];
                                const shortage = Math.max(0, (req.qty * calcPortions) - (ing?.stock || 0));
                                return sum + (shortage * (ing?.cost || 0));
                              }, 0)}
                            </td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  ) : (
                    <div className="text-center p-12 border border-purple-800/60 border-dashed rounded-2xl text-purple-500 bg-[#120518]/30 backdrop-blur-sm">
                      <Calculator size={56} className="mx-auto mb-4 opacity-30 text-purple-400" />
                      <p className="tracking-widest font-bold">請於上方選單指定擁有配方的項目</p>
                    </div>
                  )}
                </div>
              </Card>
            </div>
          )}
        </div>
      );
    };

    const ActivityManager = () => {
      const { activities, showAlert, showConfirm, showEdit, logAction } = useAppContext();
      const [actData, setActData] = useState({ name: '', type: 'percent', value: '', start: '', end: '' });

      const add = async () => {
        if (!actData.name || !actData.value || !actData.start || !actData.end) return showAlert("請填寫完整");
        await addDoc(getCollRef('bar_activities'), { name: actData.name, type: actData.type, value: Number(actData.value), startTime: new Date(actData.start).toISOString(), endTime: new Date(actData.end).toISOString(), isActive: true });
        logAction('新增活動', `新增: ${actData.name}`); setActData({name:'', type:'percent', value:'', start:'', end:''});
      };

      const edit = (act) => showEdit({
        title: '編輯活動', fields: [ { key: 'name', label: '活動名稱', defaultValue: act.name }, { key: 'type', label: '類型', type: 'select', defaultValue: act.type, options: [{value:'percent', label:'打折(%)'}, {value:'amount', label:'折抵現金($)'}] }, { key: 'value', type: 'number', label: '數值', defaultValue: act.value }, { key: 's', type: 'datetime-local', label: '開始', defaultValue: toLocalDatetime(act.startTime) }, { key: 'e', type: 'datetime-local', label: '結束', defaultValue: toLocalDatetime(act.endTime) } ],
        onSave: (v) => { if(v.name) { updateDoc(getDocRef('bar_activities', act.id), { name: v.name, type: v.type, value: Number(v.value), startTime: new Date(v.s).toISOString(), endTime: new Date(v.e).toISOString()}); logAction('編輯活動', v.name); } }
      });

      const toggle = (act) => { updateDoc(getDocRef('bar_activities', act.id), { isActive: !act.isActive }); logAction('切換狀態', `${act.name} -> ${!act.isActive}`); };
      const del = (id, name) => showConfirm("確定刪除活動？", () => { deleteDoc(getDocRef('bar_activities', id)); logAction('刪除活動', name); });

      const now = new Date().toISOString();

      return (
        <div className="space-y-6 max-w-7xl mx-auto">
          <Card className="border-orange-500/30">
            <h2 className="text-xl font-bold text-orange-100 mb-5 flex items-center gap-3"><Zap className="text-yellow-400 drop-shadow-[0_0_8px_#facc15]"/> 新增活動優惠</h2>
            <div className="grid grid-cols-1 md:grid-cols-6 gap-4 items-end bg-[#120518]/60 p-5 rounded-xl border border-purple-800/50 shadow-inner">
              <div className="md:col-span-2"><Input value={actData.name} onChange={e=>setActData({...actData,name:e.target.value})} placeholder="活動名稱 (例: Lady's Night)" /></div>
              <div className="md:col-span-1"><select value={actData.type} onChange={e=>setActData({...actData,type:e.target.value})} className="w-full bg-[#1c0c27]/80 border border-purple-800/60 text-orange-100 px-4 py-2.5 rounded-xl focus:outline-none focus:border-orange-500 shadow-sm"><option value="percent">打折(%)</option><option value="amount">折抵($)</option></select></div>
              <div className="md:col-span-1"><Input type="number" value={actData.value} onChange={e=>setActData({...actData,value:e.target.value})} placeholder="數值" /></div>
              <div className="md:col-span-1"><Input type="datetime-local" value={actData.start} onChange={e=>setActData({...actData,start:e.target.value})} className="text-sm px-3"/></div>
              <div className="md:col-span-1"><Input type="datetime-local" value={actData.end} onChange={e=>setActData({...actData,end:e.target.value})} className="text-sm px-3"/></div>
            </div>
            <Button onClick={add} className="mt-5 shadow-[0_5px_15px_rgba(249,115,22,0.3)]"><Plus size={18}/> 建立檔期</Button>
          </Card>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {activities.map(act => {
              const ongoing = act.startTime <= now && act.endTime >= now, past = act.endTime < now, future = act.startTime > now;
              let sColor = "text-purple-500", sText = "已結束";
              if (act.isActive && ongoing) { sColor = "text-orange-400 drop-shadow-[0_0_5px_#f97316]"; sText = "進行中"; }
              else if (act.isActive && future) { sColor = "text-yellow-400"; sText = "未開始"; }
              else if (!act.isActive) { sColor = "text-pink-500"; sText = "已停用"; }

              return (
                <Card key={act.id} className={`border-l-4 ${act.isActive && ongoing ? 'border-l-orange-500 shadow-[0_0_20px_rgba(249,115,22,0.15)]' : 'border-l-purple-800'} relative p-6`}>
                  <div className="absolute top-5 right-5 flex gap-1.5">
                    <button onClick={() => edit(act)} className="p-2 hover:bg-[#120518] text-purple-400 hover:text-orange-200 rounded-lg transition-colors"><Edit size={16}/></button>
                    <button onClick={() => toggle(act)} className="p-2 hover:bg-[#120518] text-purple-400 rounded-lg transition-colors">{act.isActive ? <Square size={16} className="text-pink-400"/> : <Play size={16} className="text-orange-400"/>}</button>
                    <button onClick={() => del(act.id, act.name)} className="p-2 hover:bg-[#120518] text-purple-400 hover:text-pink-500 rounded-lg transition-colors"><Trash2 size={16}/></button>
                  </div>
                  <h3 className="text-xl font-black text-orange-50 pr-24 mb-2">{act.name}</h3>
                  <p className={`text-sm font-black mb-5 tracking-widest ${sColor}`}>{sText}</p>
                  <div className="text-sm bg-[#120518]/60 p-4 rounded-xl border border-purple-900/50 shadow-inner">
                    <p className="font-mono text-purple-300 mb-3">Benefit: <span className="text-yellow-400 font-bold text-lg ml-1 drop-shadow-sm">{act.type === 'percent' ? `${act.value}% 折扣` : `-$${act.value}`}</span></p>
                    <p className="text-[11px] text-purple-400 flex items-center gap-2"><span className="w-1.5 h-1.5 bg-orange-400 rounded-full shadow-[0_0_5px_#f97316]"></span> {new Date(act.startTime).toLocaleString()}</p>
                    <p className="text-[11px] text-purple-400 flex items-center gap-2 mt-2"><span className="w-1.5 h-1.5 bg-pink-500 rounded-full shadow-[0_0_5px_#ec4899]"></span> {new Date(act.endTime).toLocaleString()}</p>
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      );
    };

    const RoleManager = () => {
      const { roles, showAlert, showConfirm, logAction } = useAppContext();
      const [newRole, setNewRole] = useState('');
      const [editing, setEditing] = useState(null);

      const add = async () => {
        if(!newRole.trim()) return showAlert("請輸入名稱");
        if(roles.find(r=>r.name===newRole)) return showAlert("已存在");
        const p = PERMISSION_LIST.reduce((a, c) => ({ ...a, [c.id]: c.id==='dashboard' }), {});
        await addDoc(getCollRef('bar_roles'), { name: newRole, permissions: p, isSystem: false });
        logAction('新增職位', newRole); setNewRole('');
      };

      const saveEdit = async () => {
        if(!editing.name.trim()) return showAlert("名稱不可為空");
        await updateDoc(getDocRef('bar_roles', editing.id), { name: editing.name, permissions: editing.permissions });
        logAction('編輯權限', editing.name); setEditing(null);
      };

      const del = (id, name) => showConfirm(`確定刪除「${name}」？`, async () => { await deleteDoc(getDocRef('bar_roles', id)); logAction('刪除職位', name); });

      return (
        <div className="space-y-6 max-w-7xl mx-auto">
          {editing && (
            <Card className="border-orange-500/50 shadow-[0_0_30px_rgba(249,115,22,0.15)] mb-8">
              <h2 className="text-xl font-bold text-orange-400 mb-5 flex items-center gap-3 drop-shadow-md"><Shield size={22} /> 編輯權限矩陣 - {editing.name}</h2>
              <Input value={editing.name} onChange={e=>setEditing({...editing, name: e.target.value})} disabled={editing.isSystem} className="max-w-sm mb-5" />
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-8 bg-[#120518]/60 p-5 rounded-2xl border border-purple-800/50 shadow-inner">
                {PERMISSION_LIST.map(p => (
                  <label key={p.id} className={`flex items-center gap-3 p-3.5 rounded-xl border cursor-pointer transition-all ${editing.permissions[p.id] ? 'bg-gradient-to-br from-pink-900/40 to-orange-900/20 border-orange-500 shadow-[0_0_15px_rgba(249,115,22,0.15)]' : 'bg-[#1c0c27]/60 border-purple-800/40 hover:bg-pink-900/20'}`}>
                    <input type="checkbox" checked={editing.permissions[p.id]||false} onChange={e=>setEditing({...editing, permissions: {...editing.permissions, [p.id]: e.target.checked}})} className="w-4 h-4 accent-orange-500 rounded"/>
                    <span className={`text-sm font-bold tracking-wider ${editing.permissions[p.id] ? 'text-orange-200' : 'text-purple-400'}`}>{p.label}</span>
                  </label>
                ))}
              </div>
              <div className="flex gap-4"><Button variant="primary" onClick={saveEdit}>部署更新</Button><Button variant="outline" onClick={()=>setEditing(null)}>放棄</Button></div>
            </Card>
          )}

          <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <Card className="xl:col-span-1 h-fit border-purple-800/50">
              <h2 className="text-xl font-bold text-orange-100 mb-5">註冊新職位</h2>
              <Input value={newRole} onChange={e=>setNewRole(e.target.value)} placeholder="例: 公關、會計" className="mb-5" />
              <Button onClick={add} className="w-full shadow-lg">建立模組</Button>
            </Card>
            <Card className="xl:col-span-2 border-purple-800/50">
              <h2 className="text-xl font-bold text-orange-100 mb-6">系統授權等級列表</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                {roles.map(r => (
                  <div key={r.id} className="bg-[#120518]/60 border border-purple-800/50 p-5 rounded-2xl flex flex-col group hover:border-pink-500/50 transition-colors shadow-sm">
                    <div className="flex justify-between items-start mb-4">
                      <div className="flex items-center gap-3"><span className="font-bold text-lg text-orange-50">{r.name}</span>{r.isSystem && <span className="bg-pink-900/40 text-pink-300 text-[10px] px-2 py-0.5 rounded-md border border-pink-800 tracking-widest uppercase shadow-sm">SYS-LOCK</span>}</div>
                      <div className="flex gap-1.5">
                        <button onClick={()=>setEditing(r)} className="p-2 hover:bg-[#1c0c27] text-purple-400 hover:text-yellow-400 rounded-lg transition-colors"><Edit size={16}/></button>
                        {!r.isSystem && <button onClick={()=>del(r.id, r.name)} className="p-2 hover:bg-[#1c0c27] text-purple-400 hover:text-pink-500 rounded-lg transition-colors"><Trash2 size={16}/></button>}
                      </div>
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {PERMISSION_LIST.filter(p=>r.permissions[p.id]).map(p=><span key={p.id} className="bg-[#1c0c27]/80 border border-purple-800/40 px-2.5 py-1 rounded-md text-[11px] text-purple-300 tracking-wider shadow-sm">{p.label}</span>)}
                      {Object.values(r.permissions||{}).every(v=>!v) && <span className="text-pink-500 text-[11px] font-bold bg-pink-950/40 border border-pink-900/50 px-2.5 py-1 rounded-md tracking-wider">RESTRICTED - 無存取權限</span>}
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </div>
      );
    };

    const UserManager = () => {
      const { users, roles, showAlert, showConfirm, showEdit, logAction } = useAppContext();
      const [data, setData] = useState({ name: '', pwd: '', role: '' });
      
      useEffect(() => { if(roles.length && !data.role) setData(d => ({...d, role: roles[0].id})); }, [roles]);

      const add = async () => {
        if(!data.name||!data.pwd||!data.role) return showAlert("請填寫完整");
        if(users.find(u=>u.name===data.name)) return showAlert("已存在");
        await addDoc(getCollRef('bar_users'), { name: data.name, password: data.pwd, role: data.role, isOnline: false, lastActive: 0 });
        logAction('新增帳號', data.name); setData({name:'', pwd:'', role: roles[0].id});
      };

      const edit = (u) => {
        const isSys = u.name === '花大熊' || u.name === '宇洛';
        showEdit({
          title: isSys ? '編輯核心管理員' : '更新帳號配置',
          fields: isSys ? [{ key: 'p', label: '安全密碼', defaultValue: u.password }] : [ { key: 'n', label: '名稱', defaultValue: u.name }, { key: 'p', label: '密碼', defaultValue: u.password }, { key: 'r', label: '職位', type: 'select', defaultValue: u.role, options: roles.map(r=>({value:r.id, label:r.name})) } ],
          onSave: (v) => { if(v.n && v.n!==u.name && users.find(x=>x.name===v.n)) return showAlert("名稱重複"); updateDoc(getDocRef('bar_users', u.id), isSys ? {password:v.p} : {name:v.n, password:v.p, role:v.r}); logAction('更新帳號', u.name); }
        });
      };
      const del = (id, n) => { if(n==='花大熊' || n === '宇洛')return showAlert("拒絕存取：無法刪除核心帳號"); showConfirm(`刪除 ${n}?`, () => { deleteDoc(getDocRef('bar_users', id)); logAction('刪除帳號', n); }); };

      return (
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 max-w-7xl mx-auto">
          <Card className="lg:col-span-1 h-fit border-t-4 border-t-orange-500 shadow-[0_0_30px_rgba(249,115,22,0.15)]">
            <h2 className="text-xl font-bold text-orange-400 mb-6 flex items-center gap-3 drop-shadow-[0_0_5px_#f97316]"><Users size={22}/> 分發新終端帳號</h2>
            <div className="space-y-4">
              <Input value={data.name} onChange={e=>setData({...data,name:e.target.value})} placeholder="人員代號 (帳號)" />
              <Input value={data.pwd} onChange={e=>setData({...data,pwd:e.target.value})} placeholder="初始密碼" />
              <select value={data.role} onChange={e=>setData({...data,role:e.target.value})} className="w-full bg-[#120518]/80 border border-purple-800/60 text-orange-100 px-4 py-3 rounded-xl focus:outline-none focus:border-orange-500 shadow-inner">
                <option value="" disabled>指派職位...</option>{roles.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
              <Button onClick={add} className="w-full mt-4 shadow-lg">註冊實體</Button>
            </div>
          </Card>
          <Card className="lg:col-span-2 border-purple-800/50">
            <h2 className="text-xl font-bold text-orange-100 mb-6">活躍連線實體列表</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
              {users.map(u => (
                <div key={u.id} className="bg-[#120518]/50 border border-purple-800/40 p-5 rounded-2xl flex justify-between items-center group backdrop-blur-md hover:border-pink-500/50 shadow-sm transition-colors">
                  <div className="min-w-0 pr-3">
                    <div className="flex items-center gap-2 mb-2"><span className="font-bold text-lg text-orange-50 truncate">{u.name}</span>{(u.role==='admin_role'||u.role==='admin') && <Zap size={14} className="text-yellow-400 fill-yellow-400 drop-shadow-[0_0_8px_#facc15]"/>}</div>
                    <div className="text-xs text-purple-400 flex flex-col gap-1.5 font-mono">
                      <span>ROLE: <span className="text-orange-200 bg-[#1c0c27]/80 border border-purple-900/50 px-1.5 py-0.5 rounded shadow-sm">{roles.find(r=>r.id===u.role)?.name || u.role}</span></span>
                      <span>PASS: <span className="text-purple-500 select-all tracking-wider">{u.password}</span></span>
                    </div>
                  </div>
                  <div className="flex flex-col gap-2 flex-shrink-0">
                    <button onClick={()=>edit(u)} className="p-2 bg-[#1c0c27]/80 hover:bg-yellow-500/10 text-purple-400 hover:text-yellow-400 rounded-lg transition-colors border border-purple-900/30"><Edit size={16}/></button>
                    {(u.name!=='花大熊' && u.name !== '宇洛') && <button onClick={()=>del(u.id, u.name)} className="p-2 bg-[#1c0c27]/80 hover:bg-pink-900/30 text-purple-400 hover:text-pink-500 rounded-lg transition-colors border border-purple-900/30"><Trash2 size={16}/></button>}
                  </div>
                </div>
              ))}
            </div>
          </Card>
        </div>
      );
    };

    const SettingsView = () => {
      const { users, roles, categories, items, tags, activities, orders, inventoryLogs, ingredients, operationLogs, settingsData, logAction, systemConfig, showAlert, warehouses } = useAppContext();
      const allData = { bar_users: users, bar_roles: roles, bar_categories: categories, bar_items: items, bar_tags: tags, bar_activities: activities, bar_orders: orders, bar_inventory: inventoryLogs, bar_ingredients: ingredients, bar_operation_logs: operationLogs };
      
      const [activeTab, setActiveTab] = useState('preferences');
      const [isImporting, setIsImporting] = useState(false);
      const [importStatus, setImportStatus] = useState('');
      const fileInputRef = useRef(null);
      const [exportConfig, setExportConfig] = useState(Object.keys(COLL_NAMES_MAP).reduce((a, k) => ({ ...a, [k]: true }), {}));
      const [pendingImport, setPendingImport] = useState(null);
      const [importConfig, setImportConfig] = useState({});

      const [newWhName, setNewWhName] = useState('');

      const handleExport = () => {
        const fd = {}; Object.keys(exportConfig).forEach(k => { if(exportConfig[k] && allData[k]) fd[k] = allData[k]; });
        if(!Object.keys(fd).length) return showAlert("請選擇匯出項目");
        const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([JSON.stringify(fd, null, 2)], { type: 'application/json' })); link.download = `srn_backup_${Date.now()}.json`; link.click(); logAction('系統備份', '匯出 JSON 資料庫');
      };

      const handleExportInventoryCSV = () => {
        const headers = ['時間', '紀錄ID', '庫存項目名稱', '變動數量', '單位成本', '總成本(花費)', '變動區域', '操作事由'];
        const rows = inventoryLogs.map(l => [
          new Date(l.timestamp).toLocaleString(), l.id, l.ingredientName, l.changeQty, 
          l.costPerItem, l.changeQty * l.costPerItem, warehouses.find(w=>w.id===l.warehouseId)?.name || '未知', l.reason
        ]);
        const csvStr = [headers.join(','), ...rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))].join('\n');
        downloadCSV(csvStr, `inventory_logs_${Date.now()}.csv`);
        logAction('報表匯出', '匯出庫存進退貨紀錄(CSV)');
      };

      const handleExportOperationLogsCSV = () => {
        const headers = ['時間', '操作人員', '動作類型', '詳細內容'];
        const rows = operationLogs.map(l => [
          new Date(l.timestamp).toLocaleString(), l.userName, l.action, l.details
        ]);
        const csvStr = [headers.join(','), ...rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))].join('\n');
        downloadCSV(csvStr, `operation_logs_${Date.now()}.csv`);
        logAction('報表匯出', '匯出系統操作日誌(CSV)');
      };

      const handleFile = (e) => {
        const f = e.target.files[0]; if(!f) return;
        const r = new FileReader(); r.onload = (ev) => {
          try { const d = JSON.parse(ev.target.result); setPendingImport(d); const ic = {}; Object.keys(d).forEach(k => { if(COLL_NAMES_MAP[k]) ic[k]=true; }); setImportConfig(ic); setImportStatus(''); } catch(err) { showAlert("JSON格式錯誤"); }
          e.target.value = '';
        }; r.readAsText(f);
      };

      const execImport = async () => {
        if(!pendingImport) return; setIsImporting(true); setImportStatus('核心覆寫協議執行中...');
        try {
          let c = 0;
          for (const [coll, docsArr] of Object.entries(pendingImport)) {
            if(!importConfig[coll]) continue;
            for (const docData of docsArr) {
              const { id, ...rest } = docData; if(!id) continue; let targetId = id;
              if (rest.name && ['bar_users','bar_roles','bar_categories','bar_items','bar_tags','bar_activities','bar_ingredients'].includes(coll)) {
                const exist = allData[coll.replace('bar_','')]?.find(d => d.name === rest.name); if(exist) targetId = exist.id;
              }
              await setDoc(getDocRef(coll, targetId), rest); c++;
            }
          }
          setImportStatus(`覆寫成功。重建索引：${c} 個節點。`); logAction('系統還原', `更新 ${c} 筆`); setPendingImport(null);
        } catch(err) { setImportStatus(`核心錯誤: ${err.message}`); } finally { setIsImporting(false); }
      };

      const addWarehouse = async () => {
        if (!newWhName.trim()) return;
        const updatedWarehouses = [...warehouses, { id: 'w_' + Date.now(), name: newWhName }];
        await setDoc(getDocRef('bar_settings', 'config'), { warehouses: updatedWarehouses }, {merge:true});
        logAction('系統設定', `新增區域: ${newWhName}`);
        setNewWhName('');
      };

      const delWarehouse = async (wId) => {
        if (warehouses.length <= 1) return showAlert("系統至少需要保留一個區域");
        const updatedWarehouses = warehouses.filter(w => w.id !== wId);
        await setDoc(getDocRef('bar_settings', 'config'), { warehouses: updatedWarehouses }, {merge:true});
        logAction('系統設定', `移除區域節點`);
      };

      return (
        <Card className="max-w-5xl mx-auto border-orange-500/30 bg-[#14051a]/90 backdrop-blur-3xl p-0 overflow-hidden shadow-[0_15px_50px_rgba(0,0,0,0.8)]">
          <div className="flex border-b border-purple-900/60 bg-[#0a020d]">
            {[ {id:'preferences', l:'系統偏好', i:Sliders}, {id:'backup', l:'資料庫I/O', i:Settings}, {id:'logs', l:'操作端點追蹤', i:History} ].map(t=>(
              <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`flex-1 py-4.5 font-bold flex items-center justify-center gap-2.5 transition-all ${activeTab===t.id?'bg-[#1c0c27] text-orange-400 border-b-2 border-orange-500 shadow-[inset_0_-15px_20px_rgba(249,115,22,0.05)] tracking-widest':'text-purple-400 hover:text-orange-200 hover:bg-[#120518] tracking-wider'}`}>
                <t.i size={18}/> <span className="hidden sm:inline">{t.l}</span>
              </button>
            ))}
          </div>

          <div className="p-6 md:p-10 min-h-[500px]">
            {activeTab === 'preferences' && (
              <div className="space-y-8">
                <div>
                  <h3 className="text-xl font-bold text-orange-100 mb-5 border-b border-purple-900/50 pb-3">區域與吧台管理</h3>
                  <div className="bg-[#120518]/60 p-6 rounded-2xl border border-purple-800/40 shadow-inner">
                    <div className="flex gap-3 mb-5">
                      <Input value={newWhName} onChange={e=>setNewWhName(e.target.value)} placeholder="新增樓層/吧台名稱 (例: VIP包廂)" className="max-w-xs"/>
                      <Button onClick={addWarehouse}>建立節點</Button>
                    </div>
                    <div className="flex flex-wrap gap-3">
                      {warehouses.map(w => (
                        <div key={w.id} className="bg-[#1c0c27]/80 border border-purple-800/50 px-4 py-2.5 rounded-xl flex items-center gap-2.5 text-sm text-orange-50 shadow-sm">
                          <Warehouse size={16} className="text-purple-400"/>
                          {w.name}
                          <button onClick={() => delWarehouse(w.id)} className="text-purple-500 hover:text-pink-400 ml-2 transition-colors"><X size={16}/></button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div>
                  <h3 className="text-xl font-bold text-orange-100 mb-5 border-b border-purple-900/50 pb-3">全域成本運算引擎</h3>
                  <label className="flex items-start gap-5 p-6 bg-[#120518]/60 border border-purple-800/40 rounded-2xl cursor-pointer hover:border-pink-500/50 transition-colors group shadow-inner">
                    <input type="checkbox" checked={systemConfig.ignoreAllCosts} onChange={async(e)=>{ const v=e.target.checked; await setDoc(getDocRef('bar_settings', 'config'), {ignoreAllCosts:v}, {merge:true}); logAction('系統設定', `全域無視成本: ${v}`); }} className="mt-1 w-5 h-5 accent-pink-600 rounded"/>
                    <div>
                      <div className="font-black text-orange-100 text-lg group-hover:text-pink-400 transition-colors">強制終止成本計算 (IGNORE_ALL_COSTS)</div>
                      <div className="text-sm text-purple-300 mt-2.5 leading-relaxed">啟動此覆寫指令後，儀表板的「淨利」模組將 100% 映射「總營收」，且結帳運算核心將忽略所有配方成本。<br/><span className="text-yellow-400 font-bold drop-shadow-sm">*註：庫存數量的自動扣除機制 (Stock Deductions) 不受此指令影響，仍會正常運作。</span></div>
                    </div>
                  </label>
                </div>
              </div>
            )}
            
            {activeTab === 'backup' && (
              <div className="space-y-8">
                <div className="bg-[#120518]/60 p-8 rounded-2xl border border-purple-800/40 shadow-inner">
                  <h3 className="text-lg font-bold text-orange-100 mb-4 flex items-center gap-3"><FileSpreadsheet className="text-green-400 drop-shadow-[0_0_5px_#4ade80]"/> Excel (CSV) 報表匯出</h3>
                  <p className="text-sm text-purple-300 mb-6 leading-relaxed">匯出包含 UTF-8 編碼的 CSV 檔案，可直接使用 Excel 開啟且不會亂碼，適用於每日對帳與分析。</p>
                  <div className="flex flex-wrap gap-4">
                    <Button onClick={handleExportInventoryCSV} className="!bg-gradient-to-r !from-green-700 !to-emerald-600 hover:!from-green-600 hover:!to-emerald-500 !border-green-500/50 !shadow-[0_0_15px_rgba(52,211,153,0.3)]"><FileSpreadsheet size={16}/> 匯出 庫存進退貨紀錄</Button>
                    <Button onClick={handleExportOperationLogsCSV} className="!bg-gradient-to-r !from-green-700 !to-emerald-600 hover:!from-green-600 hover:!to-emerald-500 !border-green-500/50 !shadow-[0_0_15px_rgba(52,211,153,0.3)]"><FileSpreadsheet size={16}/> 匯出 系統操作日誌</Button>
                  </div>
                </div>

                <div className="bg-[#120518]/60 p-8 rounded-2xl border border-purple-800/40 shadow-inner">
                  <h3 className="text-lg font-bold text-orange-100 mb-4 flex items-center gap-3"><Download className="text-blue-400 drop-shadow-[0_0_5px_#60a5fa]"/> 系統資料庫打包 (JSON)</h3>
                  <p className="text-sm text-purple-300 mb-6 leading-relaxed">將完整的系統架構資料打包為 JSON 格式，僅供系統還原與資料遷移使用。</p>
                  <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 mb-8">
                    {Object.entries(COLL_NAMES_MAP).map(([k, l]) => (
                      <label key={k} className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition-colors ${exportConfig[k] ? 'border-blue-500/60 bg-blue-900/20 shadow-[0_0_10px_rgba(59,130,246,0.15)]' : 'border-purple-800/50 hover:border-purple-600'}`}>
                        <input type="checkbox" checked={exportConfig[k]||false} onChange={e=>setExportConfig({...exportConfig, [k]:e.target.checked})} className="w-4 h-4 accent-blue-500 rounded"/>
                        <span className={`text-sm font-mono tracking-wider ${exportConfig[k] ? 'text-blue-100' : 'text-purple-400'}`}>{l}</span>
                      </label>
                    ))}
                  </div>
                  <Button onClick={handleExport} className="w-full sm:w-auto !bg-gradient-to-r !from-blue-700 !to-cyan-600 hover:!from-blue-600 hover:!to-cyan-500 !shadow-[0_0_15px_rgba(56,189,248,0.4)] !border-blue-400/50"><FileJson size={18}/> 建立 JSON 備份封裝</Button>
                </div>

                <div className="bg-pink-950/20 p-8 rounded-2xl border border-pink-900/40 shadow-inner">
                  <h3 className="text-lg font-bold text-pink-400 mb-4 flex items-center gap-3 drop-shadow-[0_0_5px_#ec4899]"><Upload/> 核心覆寫與還原 (Restore)</h3>
                  <input type="file" accept=".json" ref={fileInputRef} onChange={handleFile} className="hidden" />
                  {!pendingImport ? (
                    <Button variant="outline" onClick={()=>fileInputRef.current?.click()} className="text-pink-400 border-pink-900/60 hover:bg-pink-900/30 w-full sm:w-auto mt-2">掛載外部 JSON 封裝檔</Button>
                  ) : (
                    <div className="border border-pink-700/50 bg-[#120518]/80 p-6 rounded-xl shadow-inner mt-4">
                      <div className="flex justify-between items-center mb-5 border-b border-purple-900/60 pb-3">
                        <h4 className="font-bold text-pink-400 font-mono tracking-widest uppercase">Select Modules to Overwrite</h4>
                        <button onClick={()=>setPendingImport(null)} className="text-purple-400 hover:text-orange-200 bg-[#1c0c27] p-1.5 rounded-lg transition-colors"><X size={18}/></button>
                      </div>
                      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 mb-8">
                        {Object.keys(pendingImport).filter(k=>COLL_NAMES_MAP[k]).map(k => (
                          <label key={k} className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition-colors ${importConfig[k] ? 'border-pink-500/60 bg-pink-900/20 shadow-[0_0_10px_rgba(236,72,153,0.15)]' : 'border-purple-800/50 hover:border-purple-600'}`}>
                            <input type="checkbox" checked={importConfig[k]||false} onChange={e=>setImportConfig({...importConfig, [k]:e.target.checked})} className="w-4 h-4 accent-pink-500 rounded"/>
                            <span className={`text-sm font-mono tracking-wider ${importConfig[k] ? 'text-pink-100 font-bold' : 'text-purple-400'}`}>{COLL_NAMES_MAP[k]} <span className="text-[10px] opacity-70">({pendingImport[k].length})</span></span>
                          </label>
                        ))}
                      </div>
                      <Button variant="danger" onClick={execImport} disabled={isImporting || !Object.values(importConfig).some(v=>v)} className="w-full font-black tracking-widest shadow-[0_0_20px_rgba(236,72,153,0.4)] text-lg py-3.5">
                        {isImporting ? 'EXECUTING OVERWRITE...' : 'CONFIRM OVERWRITE AND RESTORE'}
                      </Button>
                    </div>
                  )}
                  {importStatus && <p className={`mt-5 text-sm font-mono tracking-wider ${importStatus.includes('成功') ? 'text-green-400 drop-shadow-[0_0_5px_#4ade80]' : 'text-pink-500 drop-shadow-[0_0_5px_#ec4899]'}`}>{importStatus}</p>}
                </div>
              </div>
            )}

            {activeTab === 'logs' && (
              <div className="h-full flex flex-col">
                <div className="flex items-center justify-between mb-5 bg-[#120518]/60 p-4 rounded-xl border border-purple-800/40 shadow-inner">
                  <p className="text-xs text-purple-400 font-mono tracking-widest">SYS_LOG_RETENTION: 30 DAYS</p>
                  <div className="text-[11px] bg-yellow-900/20 text-yellow-400 px-3.5 py-1.5 rounded-full border border-yellow-600/40 font-bold tracking-widest shadow-sm">
                    TOTAL: {operationLogs.length}
                  </div>
                </div>
                <div className="overflow-x-auto overflow-y-auto max-h-[500px] border border-purple-900/50 rounded-2xl bg-[#1c0c27]/40 custom-scrollbar shadow-inner">
                  <table className="w-full text-left border-collapse">
                    <thead className="bg-[#120518]/90 sticky top-0 z-10 backdrop-blur-md">
                      <tr>
                        <th className="p-4 pl-6 text-purple-400 text-[10px] tracking-widest uppercase border-b border-purple-900/60">Timestamp</th>
                        <th className="p-4 text-purple-400 text-[10px] tracking-widest uppercase border-b border-purple-900/60">Operator</th>
                        <th className="p-4 text-purple-400 text-[10px] tracking-widest uppercase border-b border-purple-900/60">Action</th>
                        <th className="p-4 pr-6 text-purple-400 text-[10px] tracking-widest uppercase border-b border-purple-900/60">Data Node</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-purple-900/30 font-mono text-sm">
                      {[...operationLogs].sort((a,b)=>b.timestamp-a.timestamp).map(l => (
                        <tr key={l.id} className="hover:bg-[#2d112b]/40 transition-colors">
                          <td className="p-4 pl-6 text-xs text-purple-400">{new Date(l.timestamp).toLocaleString()}</td>
                          <td className="p-4 text-orange-100">{l.userName}</td>
                          <td className="p-4 font-bold text-yellow-400 drop-shadow-sm">{l.action}</td>
                          <td className="p-4 pr-6 text-purple-300 truncate max-w-xs">{l.details}</td>
                        </tr>
                      ))}
                      {operationLogs.length === 0 && <tr><td colSpan="4" className="text-center p-12 text-purple-600 tracking-widest font-bold">NO LOGS FOUND</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        </Card>
      );
    };

    const TagsManager = () => { return <div className="text-center p-12 text-purple-500 font-bold tracking-widest bg-[#120518]/50 rounded-2xl border border-purple-800/40 shadow-inner">標籤功能已整合至其他模組，或依據後續需求獨立開放。</div>; };

    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>

</body>
</html>
